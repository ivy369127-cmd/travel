<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>旅行小助手</title>
    <style>
        :root { 
            --primary: #007AFF; 
            --primary-light: #5AC8FA; 
            --bg: #F2F2F7; 
            --card: #FFFFFF; 
            --text: #1C1C1E; 
            --text-muted: #8E8E93;
            --danger: #FF3B30;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 100px; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
        
        .page { display: none; padding: 16px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        header { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text); padding: 20px 20px 15px; font-size: 1.5rem; font-weight: 800; 
            position: sticky; top: 0; z-index: 50; text-align: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        
        .card { 
            background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: none;
        }
        
        .stat-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 1.05rem; }
        .stat-label { color: var(--text-muted); font-weight: 500; }
        .stat-value { color: var(--text); font-weight: 700; }
        
        .price-box { background: #F2F2F7; padding: 16px; border-radius: 16px; margin-top: 16px; text-align: right; border-left: 4px solid var(--primary); }
        .price-jpy { color: var(--primary); font-size: 1.8rem; font-weight: 800; line-height: 1.2; display: block; margin-bottom: 2px;}
        .price-twd { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; display: block;}
        
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; 
            padding: 12px 0 calc(12px + env(safe-area-inset-bottom)); 
            border-top: 0.5px solid rgba(0,0,0,0.1); z-index: 100;
        }
        .nav-item { text-align: center; font-size: 0.7rem; color: var(--text-muted); cursor: pointer; flex: 1; transition: color 0.2s; font-weight: 500; }
        .nav-item.active { color: var(--primary); font-weight: 700; }
        .nav-icon { font-size: 1.6rem; display: block; margin-bottom: 4px; transition: transform 0.2s; }
        .nav-item.active .nav-icon { transform: scale(1.15); }

        button { 
            background: var(--primary); color: white; border: none; padding: 14px 20px; 
            border-radius: 14px; font-weight: 700; font-size: 1rem; cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }
        button:active { transform: scale(0.96); opacity: 0.9; }
        .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); box-shadow: none; }
        .btn-small { background: #F2F2F7; color: var(--text); padding: 8px 16px; border-radius: 10px; font-size: 0.85rem; box-shadow: none; font-weight: 600; }
        .btn-small.danger { background: #FFEEEE; color: var(--danger); }
        .map-btn { background: #E5F1FF; color: var(--primary); width: 100%; margin-top: 12px; box-shadow: none; }
        .map-route-btn { background: #FFF0F5; color: #D81B60; width: 100%; margin-top: 12px; box-shadow: none; }
        
        input, select, textarea { 
            width: 100%; padding: 14px 16px; margin: 6px 0 16px 0; 
            border: none; background: #F2F2F7; border-radius: 12px; 
            font-size: 1rem; color: var(--text); outline: none; transition: background 0.2s;
        }
        input:focus, select:focus, textarea:focus { background: #E5E5EA; }
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--primary); cursor: pointer; margin: 0; border-radius: 6px; }
        
        .strikethrough { opacity: 0.5; filter: grayscale(50%); transition: all 0.3s; }
        .strikethrough span, .strikethrough b, .strikethrough p { text-decoration: line-through; }
        .check-row { display: flex; align-items: center; gap: 14px; padding: 12px 0; }
        .itinerary-item { border-left: 5px solid var(--primary); padding-left: 16px; margin-bottom: 16px; }
        
        .img-thumbnail { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; margin-top: 10px; display: block; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal img { max-width: 90%; max-height: 85%; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header id="header-title">旅行小助手</header>

    <div id="image-modal" class="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="">
    </div>

    <div id="home" class="page active">
        <div class="card">
            <h2 style="margin-bottom: 20px; font-weight: 800; font-size: 1.4rem;">📊 今日進度</h2>
            <div class="stat-item"><span class="stat-label">🎒 行李準備</span><span class="stat-value" id="stat-luggage">0%</span></div>
            <div class="stat-item"><span class="stat-label">📅 行程完成</span><span class="stat-value" id="stat-iti-percent">0%</span></div>
            <div class="stat-item"><span class="stat-label">🛒 購物清單</span><span class="stat-value">已買 <span id="stat-shopping">0</span> / <span id="stat-shopping-total">0</span></span></div>
            
            <div style="margin-top: 20px; padding: 20px; background: #F2F2F7; border-radius: 16px;">
                <p style="color: var(--primary); font-size: 0.9rem; font-weight: 700; margin-bottom: 4px;">📍 匯率參考</p>
                <p style="font-size: 1.6rem; font-weight: 800;">1 JPY = <span id="stat-rate">0.21</span> TWD</p>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;" id="rate-sync-info">自動同步中...</p>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button onclick="nav('itinerary')">查看行程</button>
            <button onclick="nav('shopping')" class="btn-outline">購物清單</button>
        </div>
    </div>

    <div id="itinerary" class="page">
        <div class="card">
            <h3 style="margin-bottom: 16px; font-weight: 700;">📝 加入新行程</h3>
            <div style="display: flex; gap: 10px;">
                <select id="new-iti-day" style="flex: 1;">
                    <option value="Day 1">Day 1</option><option value="Day 2">Day 2</option>
                    <option value="Day 3">Day 3</option><option value="Day 4">Day 4</option>
                    <option value="Day 5">Day 5</option><option value="Day 6">Day 6</option>
                    <option value="Day 7">Day 7</option><option value="Day 8">Day 8</option>
                    <option value="Day 9">Day 9</option><option value="Day 10">Day 10</option>
                </select>
                <input type="date" id="new-iti-date" style="flex: 1.5;">
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="time" id="new-iti-time" style="flex: 1;">
                <input type="text" id="new-iti-end" placeholder="目的地" style="flex: 2;">
            </div>
            <input type="text" id="new-iti-note" placeholder="備註 (選填)">
            <button onclick="addItinerary()" style="width: 100%;">新增行程</button>
        </div>
        
        <div id="edit-iti-form-container" style="display: none; background: #fff; padding: 20px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,122,255,0.1);">
            <h3 style="margin-bottom: 16px;">編輯行程</h3>
            <input type="hidden" id="edit-iti-id">
            <div style="display: flex; gap: 10px;">
                <select id="edit-iti-day" style="flex: 1;">
                    <option value="Day 1">Day 1</option><option value="Day 2">Day 2</option>
                    <option value="Day 3">Day 3</option><option value="Day 4">Day 4</option>
                    <option value="Day 5">Day 5</option><option value="Day 6">Day 6</option>
                    <option value="Day 7">Day 7</option><option value="Day 8">Day 8</option>
                    <option value="Day 9">Day 9</option><option value="Day 10">Day 10</option>
                </select>
                <input type="date" id="edit-iti-date" style="flex: 1.5;">
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="time" id="edit-iti-time" style="flex: 1;">
                <input type="text" id="edit-iti-end" placeholder="目的地" style="flex: 2;">
            </div>
            <input type="text" id="edit-iti-note" placeholder="備註 (選填)">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="document.getElementById('edit-iti-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button onclick="saveEditIti()" style="flex: 2;">儲存</button>
            </div>
        </div>

        <div id="itinerary-list"></div>
    </div>

    <div id="luggage" class="page">
        <div class="card">
            <h3 style="margin-bottom: 16px; font-weight: 700;">🎒 新增行李</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="new-luggage" placeholder="新增行李..." style="margin:0; flex:1.5;">
                <input type="text" id="new-luggage-note" placeholder="備註 (選填)" style="margin:0; flex:1;">
            </div>
            <button onclick="addLuggage()" style="width: 100%;">添加行李</button>
        </div>

        <div id="edit-lug-form-container" style="display: none; background: #fff; padding: 20px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,122,255,0.1);">
            <h3 style="margin-bottom: 16px;">編輯行李</h3>
            <input type="hidden" id="edit-lug-id">
            <input type="text" id="edit-lug-name" placeholder="行李名稱">
            <input type="text" id="edit-lug-note" placeholder="備註 (選填)">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="document.getElementById('edit-lug-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button onclick="saveEditLug()" style="flex: 2;">儲存</button>
            </div>
        </div>

        <div id="luggage-list"></div>
    </div>

    <div id="shopping" class="page">
        <button onclick="openAddForm()" style="width: 100%; margin-bottom: 16px;">＋ 新增商品</button>
        
        <div style="display: flex; gap: 10px; margin-bottom: 20px; background: #E5E5EA; padding: 4px; border-radius: 16px;">
            <button id="btn-filter-all" onclick="setShopFilter('all')" style="flex: 1; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); padding: 10px;">總清單</button>
            <button id="btn-filter-unpurchased" onclick="setShopFilter('unpurchased')" style="flex: 1; background: transparent; color: var(--text-muted); box-shadow: none; border-radius: 12px; padding: 10px;">尚未購買</button>
        </div>

        <div id="edit-form-container" style="display: none; background: #fff; padding: 20px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,122,255,0.1);">
            <h3 id="form-title" style="margin-bottom: 16px;">新增商品</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" placeholder="名稱">
            <div style="display: flex; gap: 10px;">
                <input type="number" id="edit-price" placeholder="日幣價格" style="flex:1;">
                <input type="text" id="edit-shop" placeholder="購買地點" style="flex:1;">
            </div>
            <input type="text" id="edit-note" placeholder="備註 (選填)">
            <label style="font-size: 0.9rem; color: var(--text-muted); display: block; margin: 4px 0 8px 4px;">加入/更新圖片 (選填)</label>
            <input type="file" id="edit-image" accept="image/*" style="padding: 12px; background: white; border: 1px dashed #ccc;">
            
            <div style="display: flex; gap: 10px; margin-top: 16px;">
                <button onclick="document.getElementById('edit-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button onclick="saveShoppingItem()" style="flex: 2;">儲存</button>
            </div>
        </div>
        
        <div id="shopping-list"></div>
    </div>

    <div id="settings" class="page">
        <div class="card">
            <h3 style="margin-bottom:20px; font-weight: 800;">⚙️ 匯率設定</h3>
            
            <label style="font-size: 0.9rem; color: var(--text-muted); display: block; margin: 0 0 8px 4px;">手動設定匯率 (1 JPY = ? TWD)</label>
            <div style="display: flex; gap: 10px; margin-bottom: 16px;">
                <input type="number" step="0.0001" id="manual-rate-input" placeholder="例如: 0.215" style="margin: 0; flex: 2;">
                <button onclick="saveManualRate()" style="flex: 1;">儲存</button>
            </div>

            <div style="text-align: center; margin: 16px 0; color: #C7C7CC; font-size: 0.85rem; font-weight: 600;">— 或 —</div>
            
            <button id="update-rate-btn" onclick="fetchLiveRate()" class="btn-outline" style="width: 100%; margin-bottom: 10px;">🌐 從網路獲取最新匯率</button>
            
            <p id="settings-rate-display" style="text-align: center; font-size: 0.9rem; color: var(--primary); font-weight: 700; margin-bottom: 24px; background: #E5F1FF; padding: 10px; border-radius: 12px;"></p>
        </div>

        <div class="card">
            <h3 style="margin-bottom:20px; font-weight: 800;">💾 資料備份</h3>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; margin-left: 4px;">把下方的亂碼複製起來傳到 LINE，換手機或電腦時貼上就能還原所有資料。</p>
            <textarea id="backup-data" placeholder="備份碼顯示於此..." style="height: 80px; font-size: 0.8rem; line-height: 1.4;"></textarea>
            <div style="display: flex; gap: 10px; margin-bottom: 24px;">
                <button onclick="exportData()" style="flex:1; background: #34C759; box-shadow: 0 4px 12px rgba(52,199,89,0.2);">導出備份碼</button>
                <button onclick="importData()" style="flex:1; background: #FF9500; box-shadow: 0 4px 12px rgba(255,149,0,0.2);">導入備份碼</button>
            </div>
            
            <button onclick="resetData()" style="width: 100%; background: #FF3B30; box-shadow: 0 4px 12px rgba(255,59,48,0.2);">⚠️ 清空所有資料</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div id="nav-home" class="nav-item active" onclick="nav('home')"><span class="nav-icon">🏠</span>首頁</div>
        <div id="nav-luggage" class="nav-item" onclick="nav('luggage')"><span class="nav-icon">🎒</span>行李</div>
        <div id="nav-itinerary" class="nav-item" onclick="nav('itinerary')"><span class="nav-icon">📅</span>行程</div>
        <div id="nav-shopping" class="nav-item" onclick="nav('shopping')"><span class="nav-icon">🛒</span>購物</div>
        <div id="nav-settings" class="nav-item" onclick="nav('settings')"><span class="nav-icon">⚙️</span>設定</div>
    </nav>

<script>
    const defaultData = { rate: 0.21, luggage: [], itinerary: [], shopping: [] };
    let appData = JSON.parse(localStorage.getItem('jpTravelApp')) || defaultData;
    let currentShopFilter = 'all';

    function saveData() { localStorage.setItem('jpTravelApp', JSON.stringify(appData)); updateStats(); }

    function nav(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + pageId).classList.add('active');
        if(pageId === 'itinerary') renderItinerary();
        if(pageId === 'luggage') renderLuggage();
        if(pageId === 'shopping') renderShopping();
        window.scrollTo(0, 0);
    }

    // --- 行程功能 ---
    function renderItinerary() {
        const container = document.getElementById('itinerary-list'); container.innerHTML = '';
        
        const sortedIti = [...appData.itinerary].sort((a, b) => {
            if (a.checked !== b.checked) return a.checked ? 1 : -1;
            if (a.date !== b.date) return a.date.localeCompare(b.date);
            return a.time.localeCompare(b.time);
        });

        let prevLocationByDay = {};

        sortedIti.forEach((item) => {
            let url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.end)}`;
            let btnHtml = `<button class="map-btn" onclick="window.open('${url}')">📍 導航</button>`;
            
            if (prevLocationByDay[item.date] && !item.checked) {
                const origin = prevLocationByDay[item.date];
                url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(item.end)}`;
                btnHtml = `<button class="map-route-btn" onclick="window.open('${url}')">🚗 路線與時間</button>`;
            }
            prevLocationByDay[item.date] = item.end;

            const dateStr = item.realDate ? `<span style="margin-left:6px; color:var(--text-muted);">${item.realDate}</span>` : '';
            const noteStr = item.note ? `<p style="font-size:0.85rem; color:var(--text-muted); margin-top:8px; background:#F2F2F7; padding:6px 10px; border-radius:8px; display:inline-block;">📝 ${item.note}</p>` : '';
            
            container.innerHTML += `
            <div class="card itinerary-item ${item.checked?'strikethrough':''}">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="display:flex; gap:12px; flex:1;">
                        <input type="checkbox" ${item.checked?'checked':''} onchange="toggleIti(${item.id})">
                        <div style="flex:1;">
                            <div style="font-size:0.85rem; color:var(--text-muted); font-weight:600; margin-bottom:4px;">${item.date} ${dateStr} <span style="color:var(--primary); margin-left:6px;">${item.time}</span></div>
                            <p style="font-weight:700; font-size:1.1rem; color:var(--text);">${item.end}</p>
                            ${noteStr}
                            ${!item.checked ? `<br>${btnHtml}` : ''}
                        </div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:10px; margin-left:12px;">
                        <button class="btn-small" onclick="editIti(${item.id})">編輯</button>
                        <button class="btn-small danger" onclick="deleteIti(${item.id})">刪除</button>
                    </div>
                </div>
            </div>`;
        });
    }
    
    function toggleIti(id) { const i = appData.itinerary.find(x=>x.id==id); i.checked = !i.checked; saveData(); renderItinerary(); }
    
    function addItinerary() { 
        const d = document.getElementById('new-iti-day').value;
        const rd = document.getElementById('new-iti-date').value;
        const t = document.getElementById('new-iti-time').value;
        const e = document.getElementById('new-iti-end').value;
        const n = document.getElementById('new-iti-note').value;
        if(e){ 
            appData.itinerary.push({id:Date.now(), date:d, realDate:rd, time:t, end:e, note:n, checked:false}); 
            saveData(); renderItinerary();
            document.getElementById('new-iti-end').value = '';
            document.getElementById('new-iti-note').value = '';
        }
    }

    function editIti(id) {
        const item = appData.itinerary.find(i => i.id == id);
        if(!item) return;
        document.getElementById('edit-iti-id').value = item.id;
        document.getElementById('edit-iti-day').value = item.date || 'Day 1';
        document.getElementById('edit-iti-date').value = item.realDate || '';
        document.getElementById('edit-iti-time').value = item.time || '';
        document.getElementById('edit-iti-end').value = item.end || '';
        document.getElementById('edit-iti-note').value = item.note || '';
        document.getElementById('edit-iti-form-container').style.display = 'block';
        window.scrollTo({ top: document.getElementById('edit-iti-form-container').offsetTop - 100, behavior: 'smooth' });
    }

    function saveEditIti() {
        const id = document.getElementById('edit-iti-id').value;
        const d = document.getElementById('edit-iti-day').value;
        const rd = document.getElementById('edit-iti-date').value;
        const t = document.getElementById('edit-iti-time').value;
        const e = document.getElementById('edit-iti-end').value;
        const n = document.getElementById('edit-iti-note').value;
        if(!e) return;

        const index = appData.itinerary.findIndex(x => x.id == id);
        if(index > -1) {
            appData.itinerary[index].date = d;
            appData.itinerary[index].realDate = rd;
            appData.itinerary[index].time = t;
            appData.itinerary[index].end = e;
            appData.itinerary[index].note = n;
            document.getElementById('edit-iti-form-container').style.display = 'none';
            saveData(); renderItinerary();
        }
    }

    function deleteIti(id) { 
        if(confirm("確定要刪除這個行程嗎？")) { appData.itinerary = appData.itinerary.filter(i=>i.id!=id); saveData(); renderItinerary(); }
    }

    // --- 行李功能 ---
    function renderLuggage() {
        const container = document.getElementById('luggage-list'); container.innerHTML = '';
        appData.luggage.forEach((item) => {
            const noteStr = item.note ? `<p style="font-size:0.85rem; color:var(--text-muted); margin-top:4px;">📝 ${item.note}</p>` : '';
            
            container.innerHTML += `
            <div class="card check-row ${item.checked?'strikethrough':''}" style="align-items:flex-start;">
                <div style="display:flex; gap:16px; flex:1; align-items: center;">
                    <input type="checkbox" ${item.checked?'checked':''} onchange="toggleLug(${item.id})">
                    <div style="flex:1;">
                        <span style="font-weight:700; font-size:1.05rem;">${item.name}</span>
                        ${noteStr}
                    </div>
                </div>
                <div style="display:flex; flex-direction:column; gap:10px; margin-left:12px;">
                    <button class="btn-small" onclick="editLug(${item.id})">編輯</button>
                    <button class="btn-small danger" onclick="deleteLug(${item.id})">刪除</button>
                </div>
            </div>`;
        });
    }

    function toggleLug(id) { const i = appData.luggage.find(x=>x.id==id); i.checked = !i.checked; saveData(); renderLuggage(); }
    
    function addLuggage() { 
        const v = document.getElementById('new-luggage').value; 
        const n = document.getElementById('new-luggage-note').value;
        if(v){ 
            appData.luggage.push({id:Date.now(), name:v, note:n, checked:false}); 
            document.getElementById('new-luggage').value=''; 
            document.getElementById('new-luggage-note').value='';
            saveData(); renderLuggage(); 
        }
    }

    function editLug(id) {
        const item = appData.luggage.find(l => l.id == id);
        if(!item) return;
        document.getElementById('edit-lug-id').value = item.id;
        document.getElementById('edit-lug-name').value = item.name || '';
        document.getElementById('edit-lug-note').value = item.note || '';
        document.getElementById('edit-lug-form-container').style.display = 'block';
        window.scrollTo({ top: document.getElementById('edit-lug-form-container').offsetTop - 100, behavior: 'smooth' });
    }

    function saveEditLug() {
        const id = document.getElementById('edit-lug-id').value;
        const name = document.getElementById('edit-lug-name').value;
        const note = document.getElementById('edit-lug-note').value;
        if(!name) return;

        const index = appData.luggage.findIndex(x => x.id == id);
        if(index > -1) {
            appData.luggage[index].name = name;
            appData.luggage[index].note = note;
            document.getElementById('edit-lug-form-container').style.display = 'none';
            saveData(); renderLuggage();
        }
    }

    function deleteLug(id) { 
        if(confirm("確定要刪除這個項目嗎？")) { appData.luggage = appData.luggage.filter(l=>l.id!=id); saveData(); renderLuggage(); }
    }

    // --- 購物清單功能 ---
    function setShopFilter(mode) {
        currentShopFilter = mode;
        const btnAll = document.getElementById('btn-filter-all');
        const btnUnpurchased = document.getElementById('btn-filter-unpurchased');
        
        if (mode === 'all') {
            btnAll.style.background = 'white';
            btnAll.style.color = 'var(--text)';
            btnAll.style.boxShadow = '0 2px 6px rgba(0,0,0,0.1)';
            btnUnpurchased.style.background = 'transparent';
            btnUnpurchased.style.color = 'var(--text-muted)';
            btnUnpurchased.style.boxShadow = 'none';
        } else {
            btnUnpurchased.style.background = 'white';
            btnUnpurchased.style.color = 'var(--text)';
            btnUnpurchased.style.boxShadow = '0 2px 6px rgba(0,0,0,0.1)';
            btnAll.style.background = 'transparent';
            btnAll.style.color = 'var(--text-muted)';
            btnAll.style.boxShadow = 'none';
        }
        renderShopping();
    }

    function renderShopping() {
        const container = document.getElementById('shopping-list'); 
        container.innerHTML = '';
        
        const unpurchased = appData.shopping.filter(s => !s.checked);
        const purchased = appData.shopping.filter(s => s.checked);

        const renderItem = (item) => {
            const twd = Math.round(item.price_jpy * appData.rate);
            const noteStr = item.note ? `<p style="font-size:0.85rem; color:var(--text-muted); margin-top:6px;">📝 ${item.note}</p>` : '';
            const imgStr = item.image ? `<img src="${item.image}" class="img-thumbnail" onclick="showImage('${item.image}')">` : '';
            
            return `
            <div class="card ${item.checked?'strikethrough':''}">
                <div style="display:flex; justify-content:space-between;">
                    <div style="display:flex; gap:16px; flex:1;">
                        <input type="checkbox" ${item.checked?'checked':''} onchange="toggleShop(${item.id})">
                        <div style="flex:1;">
                            <b style="font-size:1.1rem;">${item.name}</b>
                            <p style="font-size:0.85rem; color:var(--text-muted); margin-top:2px;">📍 ${item.shop}</p>
                            ${noteStr}
                            ${imgStr}
                        </div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:10px; margin-left:12px;">
                        <button class="btn-small" onclick="editShop(${item.id})">編輯</button>
                        <button class="btn-small danger" onclick="deleteShop(${item.id})">刪除</button>
                    </div>
                </div>
                <div class="price-box">
                    <span class="price-jpy">¥ ${Number(item.price_jpy).toLocaleString()}</span>
                    <span class="price-twd">約 NT$ ${twd.toLocaleString()}</span>
                </div>
            </div>`;
        };

        if (unpurchased.length > 0) {
            if (currentShopFilter === 'all') {
                container.innerHTML += `<h4 style="margin: 10px 0 16px 4px; color: var(--text); font-size:1.1rem; font-weight:800;">🛒 尚未購買</h4>`;
            }
            unpurchased.forEach(item => { container.innerHTML += renderItem(item); });
        } else if (appData.shopping.length > 0) {
            container.innerHTML += `<div style="text-align:center; padding: 40px 0;"><span style="font-size:3rem; display:block; margin-bottom:10px;">🎉</span><p style="color:var(--text-muted); font-weight:600;">所有商品都買齊囉！</p></div>`;
        }

        if (currentShopFilter === 'all' && purchased.length > 0) {
            container.innerHTML += `<h4 style="margin: 30px 0 16px 4px; color: var(--text-muted); font-size:1.1rem; font-weight:700;">✅ 已購買</h4>`;
            purchased.forEach(item => { container.innerHTML += renderItem(item); });
        }
    }

    function toggleShop(id) { const i = appData.shopping.find(s=>s.id==id); i.checked = !i.checked; saveData(); renderShopping(); }
    
    function openAddForm() { 
        document.getElementById('form-title').innerText = '新增商品';
        document.getElementById('edit-id').value = '';
        document.getElementById('edit-name').value = '';
        document.getElementById('edit-price').value = '';
        document.getElementById('edit-shop').value = '';
        document.getElementById('edit-note').value = '';
        document.getElementById('edit-image').value = '';
        document.getElementById('edit-form-container').style.display='block'; 
        window.scrollTo({ top: document.getElementById('edit-form-container').offsetTop - 100, behavior: 'smooth' });
    }

    function editShop(id) {
        const item = appData.shopping.find(s => s.id == id);
        if(!item) return;
        
        document.getElementById('form-title').innerText = '編輯商品';
        document.getElementById('edit-id').value = item.id;
        document.getElementById('edit-name').value = item.name || '';
        document.getElementById('edit-price').value = item.price_jpy || '';
        document.getElementById('edit-shop').value = item.shop || '';
        document.getElementById('edit-note').value = item.note || '';
        document.getElementById('edit-image').value = ''; 
        
        document.getElementById('edit-form-container').style.display = 'block';
        window.scrollTo({ top: document.getElementById('edit-form-container').offsetTop - 100, behavior: 'smooth' });
    }
    
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500; const MAX_HEIGHT = 500;
                let width = img.width; let height = img.height;
                if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.6)); 
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function saveShoppingItem() {
        const id = document.getElementById('edit-id').value;
        const n = document.getElementById('edit-name').value;
        const p = document.getElementById('edit-price').value;
        const s = document.getElementById('edit-shop').value;
        const note = document.getElementById('edit-note').value;
        const fileInput = document.getElementById('edit-image');
        
        if(!n) { alert("請至少輸入商品名稱！"); return; }

        const saveToData = (imgData) => {
            if(id) {
                const index = appData.shopping.findIndex(x => x.id == id);
                if(index > -1) {
                    appData.shopping[index].name = n;
                    appData.shopping[index].price_jpy = p;
                    appData.shopping[index].shop = s;
                    appData.shopping[index].note = note;
                    if(imgData) appData.shopping[index].image = imgData; 
                }
            } else {
                appData.shopping.unshift({id:Date.now(), name:n, price_jpy:p, shop:s, note:note, image:imgData, checked:false}); 
            }
            document.getElementById('edit-form-container').style.display='none'; 
            saveData(); renderShopping();
        };

        if(fileInput.files && fileInput.files[0]) {
            compressImage(fileInput.files[0], saveToData);
        } else {
            saveToData(''); 
        }
    }
    
    function deleteShop(id) { 
        if(confirm("確定要刪除這個商品嗎？")) { appData.shopping = appData.shopping.filter(s=>s.id!=id); saveData(); renderShopping(); }
    }
    
    function showImage(src) {
        document.getElementById('modal-img').src = src;
        document.getElementById('image-modal').style.display = 'flex';
    }

    // --- 設定與匯率 ---
    function updateStats() {
        const dL = appData.luggage.filter(l => l.checked).length;
        document.getElementById('stat-luggage').innerText = appData.luggage.length ? Math.round(dL/appData.luggage.length*100)+'%' : '0%';
        const dI = appData.itinerary.filter(i => i.checked).length;
        document.getElementById('stat-iti-percent').innerText = appData.itinerary.length ? Math.round(dI/appData.itinerary.length*100)+'%' : '0%';
        document.getElementById('stat-shopping').innerText = appData.shopping.filter(s => s.checked).length;
        document.getElementById('stat-shopping-total').innerText = appData.shopping.length;
        document.getElementById('stat-rate').innerText = appData.rate;
        
        const settingsRateDisplay = document.getElementById('settings-rate-display');
        if(settingsRateDisplay) { settingsRateDisplay.innerText = "當前系統設定匯率：1 JPY = " + appData.rate + " TWD"; }
        
        const manualInput = document.getElementById('manual-rate-input');
        if(manualInput) { manualInput.value = appData.rate; }
    }

    function saveManualRate() {
        const val = parseFloat(document.getElementById('manual-rate-input').value);
        if(val && val > 0) {
            appData.rate = val;
            saveData();
            document.getElementById('rate-sync-info').innerText = "已套用手動設定匯率";
            alert("匯率已成功手動更新為: " + val);
        } else {
            alert("請輸入有效的匯率數字喔！");
        }
    }

    async function fetchLiveRate() { 
        const btn = document.getElementById('update-rate-btn');
        document.getElementById('rate-sync-info').innerText = "網路更新中...";
        if(btn) btn.innerText = "網路更新中...";
        
        try { 
            const r = await fetch('https://api.exchangerate-api.com/v4/latest/JPY'); 
            const d = await r.json(); 
            appData.rate = Math.round(d.rates.TWD * 10000)/10000; 
            saveData(); 
            document.getElementById('rate-sync-info').innerText = "最後自動更新: " + new Date().toLocaleTimeString();
            
            if(btn) { btn.innerText = "✓ 網路抓取成功"; setTimeout(() => { btn.innerText = "🌐 從網路獲取最新匯率"; }, 3000); }
        } catch(e){ 
            document.getElementById('rate-sync-info').innerText = "連網失敗，請稍後再試或使用手動輸入"; 
            if(btn) { btn.innerText = "連線失敗"; setTimeout(() => { btn.innerText = "🌐 從網路獲取最新匯率"; }, 3000); }
        } 
    }

    function exportData() { document.getElementById('backup-data').value = btoa(unescape(encodeURIComponent(JSON.stringify(appData)))); alert("備份碼已生成！\n請複製並傳送到手機，或自己保存。"); }
    function importData() { try { const code = document.getElementById('backup-data').value; if(code) { appData = JSON.parse(decodeURIComponent(escape(atob(code)))); saveData(); alert("資料導入成功！"); location.reload(); } } catch(e) { alert("代碼錯誤，請確認備份碼是否完整！"); } }
    function resetData() { if(confirm("⚠️ 警告：確定要清空所有資料嗎？此動作無法復原！")) { localStorage.clear(); location.reload(); } }

    updateStats(); fetchLiveRate();
</script>
</body>
