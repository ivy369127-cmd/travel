<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>旅行小助手</title>
    <style>
        /* 🎨 高級莫蘭迪 x 奶茶手帳風 */
        :root { 
            --bg-cream: #FCF8F2;      
            --main-text: #8A7363;     
            --main-border: #C8B6A6;   
            --main-btn: #B59D8B;      
            --card-bg: #FFFFFF;       
            
            --color-yellow: #E2B965;     
            --color-terracotta: #CD8B76; 
            --color-matcha: #9CB292;     
            --color-babyblue: #8FAEC1;   
            --color-acc: #B49BAA;        /* 💜 記帳紫色 絕對不動 */
            --color-slate: #8B9FA8;      
            
            --text-muted: #B4A7A0;    
            --input-bg: #F9F6F1;      
            --shadow-color: rgba(138, 115, 99, 0.08);
        }
        
        html { background-color: var(--bg-cream); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; }
        
        body { 
            background-color: var(--bg-cream); color: var(--main-text); 
            padding-bottom: 120px; line-height: 1.5; -webkit-tap-highlight-color: transparent; min-height: 100vh;
            background-image: radial-gradient(rgba(138, 115, 99, 0.06) 1px, transparent 1px); background-size: 18px 18px;
        }
        
        .page { display: none; padding: 18px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        header { 
            background: var(--card-bg); color: var(--main-text); 
            padding: calc(16px + env(safe-area-inset-top)) 20px 15px; 
            font-size: 1.35rem; font-weight: 900; letter-spacing: 2px;
            position: sticky; top: 0; z-index: 50; text-align: center;
            border-bottom: 2px solid var(--main-border);
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 15px var(--shadow-color);
        }
        
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 18px; 
            border: 2px solid var(--main-border);
            box-shadow: 2px 4px 0px rgba(200, 182, 166, 0.3); 
            position: relative;
        }
        
        #luggage-list .card::before, #shopping-list .card::before, #accounting-list .card::before {
            content: ""; position: absolute; top: -7px; left: 25px; transform: rotate(-3deg);
            width: 40px; height: 14px; opacity: 0.4; border-radius: 2px; z-index: 10;
        }
        #luggage-list .card::before { background-color: var(--color-terracotta); }
        #shopping-list .card::before { background-color: var(--color-babyblue); }
        #accounting-list .card::before { background-color: var(--color-yellow); }

        .stat-wrapper {
            display: flex; align-items: center; justify-content: space-between; 
            padding: 14px 16px; border-radius: 14px; margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .stat-label { font-weight: 800; font-size: 1.05rem; color: var(--main-text); }
        .stat-value { font-weight: 900; font-size: 1.15rem; }

        /* 📱 底部純淨極簡線條 SVG 導覽列 */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around; 
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); 
            border-top: 2px solid var(--main-border); z-index: 100;
            box-shadow: 0 -4px 15px var(--shadow-color);
        }
        .nav-item { 
            text-align: center; font-size: 0.65rem; color: var(--text-muted); cursor: pointer; 
            flex: 1; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-icon-bg { 
            width: 40px; height: 40px; border-radius: 20px; display: flex; justify-content: center; align-items: center; 
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: var(--text-muted);
        }
        
        /* 🛡️ 強制 SVG 透明與防黑方塊 */
        .nav-svg { 
            width: 22px; height: 22px; 
            stroke: currentColor; 
            fill: none !important; 
            stroke-width: 2.2; 
            stroke-linecap: round; 
            stroke-linejoin: round; 
        }
        
        .nav-item.active { color: var(--main-text); }
        .nav-item.active .nav-icon-bg { color: #fff; transform: translateY(-4px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        
        button { 
            background: var(--main-btn); color: white; border: 2px solid var(--main-btn); padding: 14px 20px; 
            border-radius: 14px; font-weight: 800; font-size: 1.05rem; cursor: pointer; 
            transition: 0.15s; box-shadow: 2px 3px 0 rgba(200, 182, 166, 0.4); 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: translate(2px, 2px); box-shadow: 0 1px 0 rgba(200, 182, 166, 0.4); }
        .btn-outline { background: var(--card-bg); color: var(--main-text); border: 2px solid var(--main-border); }
        
        .icon-btn {
            background: var(--input-bg); color: var(--main-text); border: 2px solid var(--main-border); 
            border-radius: 10px; width: 40px; height: 40px; padding: 0;
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.1rem; font-weight: 900; box-shadow: 1px 2px 0 rgba(200, 182, 166, 0.3); transition: 0.2s; flex-shrink: 0;
        }
        .icon-btn:active { transform: translate(1px,1px); box-shadow: none; }
        .icon-btn.danger { color: var(--color-terracotta); background: #FFF7F5; border-color: rgba(205, 139, 118, 0.5); }

        .map-btn { background: var(--main-btn); color: white; width: 100%; border-radius: 12px; border:none; padding: 14px; box-shadow: 2px 3px 0 rgba(181, 157, 139, 0.4); margin-top: 14px; }
        .map-route-btn { background: var(--color-yellow); color: var(--main-text); width: 100%; border-radius: 12px; border:none; padding: 14px; box-shadow: 2px 3px 0 rgba(226, 185, 101, 0.3); margin-top: 14px; }
        
        input, select, textarea { 
            width: 100%; padding: 14px 16px; margin: 6px 0 16px 0; 
            border: 2px solid var(--main-border); background: var(--card-bg); border-radius: 14px; 
            font-size: 1.05rem; color: var(--main-text); outline: none; font-weight: 700;
        }
        
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--color-matcha); cursor: pointer; margin: 0 14px 0 0; border-radius: 6px; border: 2px solid var(--main-border); flex-shrink: 0; }
        
        .strikethrough { opacity: 0.6; filter: grayscale(50%); transition: all 0.3s; }
        .strikethrough span, .strikethrough b, .strikethrough p { text-decoration: line-through; }
        
        .timeline-container { display: flex; margin-bottom: 22px; align-items: stretch; }
        .timeline-left { display: flex; flex-direction: column; align-items: center; margin-right: 16px; width: 50px; }
        .timeline-time { background: var(--card-bg); border: 2px solid var(--main-border); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; color: var(--main-text); z-index: 2; margin-top: 10px; box-shadow: 1px 2px 0 rgba(200, 182, 166, 0.3); }
        .timeline-line { flex: 1; border-left: 3px dashed var(--main-border); margin-top: 5px; margin-bottom: -30px; z-index: 1; }
        .timeline-card { flex: 1; margin-bottom: 0; }

        .clean-divider { display:flex; align-items:center; margin: 25px 0 18px; }
        .clean-divider::before, .clean-divider::after { content:""; flex:1; height:2px; background:var(--main-border); opacity:0.3; border-radius:2px; }
        .clean-divider span { padding: 4px 16px; font-size: 0.9rem; font-weight: 800; color: var(--main-text); border: 2px solid var(--main-border); border-radius: 20px; background: var(--input-bg); margin: 0 12px; }
        
        .rate-tag { font-size: 0.72rem; padding: 2px 6px; border-radius: 6px; border: 1px solid var(--main-border); background: var(--input-bg); color: var(--main-text); font-weight: 700; white-space: nowrap; }
        .cat-tag { font-size: 0.8rem; padding: 2px 10px; border-radius: 12px; border: 2px solid var(--main-border); background: #FFF; color: var(--main-text); font-weight: 800; }

        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 20px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-pill { padding: 8px 18px; border-radius: 20px; border: 2px solid var(--main-border); background: white; white-space: nowrap; font-size: 0.9rem; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
        
        /* 動態切換顏色 */
        .filter-pill.active.acc { background: var(--color-acc); color: white; border-color: var(--color-acc); box-shadow: 2px 2px 0 rgba(180, 155, 170, 0.4); }
        .filter-pill.active.shop { background: var(--color-babyblue); color: white; border-color: var(--color-babyblue); box-shadow: 2px 2px 0 rgba(143, 174, 193, 0.4); }

        /* 🧮 計算機面板 */
        .calc-panel { background: var(--input-bg); border: 2px solid var(--main-border); border-radius: 16px; padding: 16px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { padding: 14px 0; background: white; border: 2px solid var(--main-border); border-radius: 12px; font-weight: 900; font-size: 1.2rem; color: var(--main-text); cursor: pointer; box-shadow: 1px 2px 0 rgba(200,182,166,0.3);}
        .calc-btn:active { transform: translate(1px,1px); box-shadow: none; }
        .calc-btn.op { background: var(--bg-cream); color: var(--main-btn); }
        .calc-btn.eq { background: var(--main-btn); color: white; border-color: var(--main-btn); grid-column: span 2; box-shadow: 1px 2px 0 rgba(181, 157, 139, 0.4);}
        .calc-display { grid-column: span 4; background: white; border: 2px solid var(--main-border); border-radius: 12px; padding: 12px 16px; text-align: right; font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; overflow: hidden; color: var(--main-text);}

        .img-thumbnail { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; margin-top: 12px; display: block; border: 2px solid var(--main-border); box-shadow: 2px 2px 0 rgba(200, 182, 166, 0.3); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(138, 115, 99, 0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 85%; border-radius: 20px; border: 4px solid var(--bg-cream); }
    </style>
</head>
<body>

    <header id="header-title">旅行小助手</header>

    <div id="image-modal" class="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="">
    </div>

    <div id="home" class="page active">
        <div class="card">
            <h2 style="margin-bottom: 20px; font-weight: 900; font-size: 1.45rem; color: var(--main-text);">
                今日進度
            </h2>
            
            <div class="stat-wrapper" style="background: rgba(205, 139, 118, 0.1);">
                <div class="stat-label" style="color: var(--color-terracotta);">行李準備</div>
                <span class="stat-value" style="color: var(--color-terracotta);" id="stat-luggage">0%</span>
            </div>
            <div class="stat-wrapper" style="background: rgba(156, 178, 146, 0.15);">
                <div class="stat-label" style="color: var(--color-matcha);">行程完成</div>
                <span class="stat-value" style="color: var(--color-matcha);" id="stat-iti-percent">0%</span>
            </div>
            <div class="stat-wrapper" style="background: rgba(143, 174, 193, 0.15);">
                <div class="stat-label" style="color: var(--color-babyblue);">購物清單</div>
                <span class="stat-value" style="color: var(--color-babyblue);">已買 <span id="stat-shopping">0</span> / <span id="stat-shopping-total">0</span></span>
            </div>
            <div class="stat-wrapper" style="background: rgba(180, 155, 170, 0.15);">
                <div class="stat-label" style="color: var(--color-acc);">目前總花費</div>
                <span class="stat-value" style="color: var(--color-acc);">
                    <span class="curr-sym">¥</span> <span id="stat-acc-jpy">0</span>
                    <span style="font-size:0.85rem; color:var(--text-muted); margin-left:4px; font-weight:700;">(約 NT$ <span id="stat-acc-twd">0</span>)</span>
                </span>
            </div>
        </div>

        <div class="card" style="padding-bottom: 24px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h3 style="font-weight: 900; color: var(--main-text);">匯率換算機</h3>
                <select id="currency-selector" onchange="changeCurrency()" style="width: auto; padding: 6px 12px; margin: 0; font-size: 0.95rem; border-radius: 10px;">
                    <option value="JPY">🇯🇵 日幣 (JPY)</option>
                    <option value="KRW">🇰🇷 韓元 (KRW)</option>
                    <option value="USD">🇺🇸 美金 (USD)</option>
                    <option value="EUR">🇪🇺 歐元 (EUR)</option>
                    <option value="THB">🇹🇭 泰銖 (THB)</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 18px;">
                <button id="calc-btn-auto" onclick="setCalcMode('auto')" style="flex: 1; padding: 12px 8px; flex-direction: column; gap: 2px;">
                    <span style="font-size: 0.8rem; opacity: 0.9;">網路匯率</span>
                    <span style="font-size: 1.2rem; font-weight: 900;" id="btn-rate-auto">0.21</span>
                </button>
                <button id="calc-btn-manual" onclick="setCalcMode('manual')" style="flex: 1; padding: 12px 8px; flex-direction: column; gap: 2px;" class="btn-outline">
                    <span style="font-size: 0.8rem; opacity: 0.9;">手動匯率</span>
                    <span style="font-size: 1.2rem; font-weight: 900;" id="btn-rate-manual">0.21</span>
                </button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 12px; background: var(--price-bg); padding: 16px; border-radius: 16px; border: 2px solid var(--main-border);">
                <div style="flex: 1;">
                    <label id="calc-label-src" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 800; display:block; margin-bottom: 6px;">外幣金額</label>
                    <input type="number" id="calc-input-jpy" placeholder="輸入外幣" oninput="runCalculator('jpy')" style="margin: 0; padding: 12px 10px; font-size: 1.2rem; background: #fff;">
                </div>
                <div style="font-size: 1.5rem; color: var(--main-border); font-weight: 900; padding-top: 20px;">⇌</div>
                <div style="flex: 1;">
                    <label style="font-size: 0.85rem; color: var(--text-muted); font-weight: 800; display:block; margin-bottom: 6px;">🇹🇼 台幣 (TWD)</label>
                    <input type="number" id="calc-input-twd" placeholder="輸入台幣" oninput="runCalculator('twd')" style="margin: 0; padding: 12px 10px; font-size: 1.2rem; background: #fff;">
                </div>
            </div>
            <p style="font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 12px;" id="rate-sync-info">自動同步中...</p>
        </div>
    </div>

    <div id="itinerary" class="page">
        <button onclick="toggleForm('edit-iti-form-container', openItiForm)" style="width: 100%; margin-bottom: 24px; background: var(--color-matcha); border-color: var(--color-matcha);">
            ＋ 加入新行程
        </button>
        
        <div id="edit-iti-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px;">
            <h3 id="iti-form-title" style="margin-bottom: 16px; font-weight: 900;">新增行程</h3>
            <input type="hidden" id="edit-iti-id">
            <div style="display: flex; gap: 10px;">
                <select id="edit-iti-day" style="flex: 1;"><option value="Day 1">Day 1</option><option value="Day 2">Day 2</option><option value="Day 3">Day 3</option><option value="Day 4">Day 4</option><option value="Day 5">Day 5</option></select>
                <input type="date" id="edit-iti-date" style="flex: 1.5;">
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="time" id="edit-iti-time" style="flex: 1;">
                <input type="text" id="edit-iti-end" placeholder="目的地" style="flex: 2;">
            </div>
            <input type="text" id="edit-iti-note" placeholder="備註 (選填)">
            <div style="display: flex; gap: 10px; margin-top: 12px;">
                <button onclick="document.getElementById('edit-iti-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button id="iti-save-btn" onclick="addItinerary()" style="flex: 2; background: var(--color-matcha); border-color: var(--color-matcha);">新增</button>
            </div>
        </div>

        <div id="itinerary-list"></div>
    </div>

    <div id="luggage" class="page">
        <button onclick="toggleForm('edit-lug-form-container', openLugForm)" style="width: 100%; margin-bottom: 24px; background: var(--color-terracotta); border-color: var(--color-terracotta);">
            ＋ 新增行李
        </button>

        <div id="edit-lug-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px;">
            <h3 id="lug-form-title" style="margin-bottom: 16px; font-weight: 900;">新增行李</h3>
            <input type="hidden" id="edit-lug-id">
            <input type="text" id="edit-lug-name" placeholder="行李名稱">
            <input type="text" id="edit-lug-note" placeholder="備註 (選填)">
            <div style="display: flex; gap: 10px; margin-top: 12px;">
                <button onclick="document.getElementById('edit-lug-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button id="lug-save-btn" onclick="addLuggage()" style="flex: 2; background: var(--color-terracotta); border-color: var(--color-terracotta);">新增</button>
            </div>
        </div>

        <div id="luggage-list"></div>
    </div>

    <div id="shopping" class="page">
        <button onclick="toggleForm('edit-form-container', openAddForm)" style="width: 100%; margin-bottom: 24px; background: var(--color-babyblue); border-color: var(--color-babyblue);">
            ＋ 新增商品
        </button>
        
        <div id="shop-filter-bar" class="filter-scroll" style="margin-bottom: 16px;">
            <div class="filter-pill active shop" onclick="setShopForFilter('全部', this)">全部清單</div>
            <div class="filter-pill shop" onclick="setShopForFilter('自己買', this)">自己買</div>
            <div class="filter-pill shop" onclick="setShopForFilter('家人', this)">家人</div>
            <div class="filter-pill shop" onclick="setShopForFilter('代購', this)">代購</div>
        </div>

        <div id="edit-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px;">
            <h3 id="form-title" style="margin-bottom: 16px; font-weight: 900;">新增商品</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" placeholder="名稱">
            
            <div style="display: flex; gap: 10px;">
                <input type="number" id="edit-qty" placeholder="數量" style="flex:0.8;" min="1" value="1">
                <input type="number" id="edit-price" placeholder="單價金額" style="flex:1.2;">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <select id="edit-shop-for" style="flex: 1;">
                    <option value="自己買">自己買</option>
                    <option value="家人">家人</option>
                    <option value="代購">代購</option>
                </select>
                <input type="text" id="edit-shop" placeholder="購買地點 (選填)" style="flex: 2;">
            </div>
            
            <input type="text" id="edit-note" placeholder="備註 (選填)">
            
            <label style="font-size: 0.95rem; font-weight: 800; display: block; margin: 4px 0 8px 4px;">加入圖片 (選填)</label>
            <input type="file" id="edit-image" accept="image/*" style="padding: 12px; background: white; border: 2px dashed var(--main-border);">
            
            <div style="display: flex; gap: 10px; margin-top: 16px;">
                <button onclick="document.getElementById('edit-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button onclick="saveShoppingItem()" style="flex: 2; background: var(--color-babyblue); border-color: var(--color-babyblue);">儲存</button>
            </div>
        </div>
        
        <div id="shopping-list"></div>
    </div>

    <div id="accounting" class="page">
        <div class="card" style="background-image: linear-gradient(135deg, var(--color-acc) 0%, #9E8594 100%); color: #FFF; border: none; box-shadow: 0 8px 20px rgba(180, 155, 170, 0.4);">
            <p style="font-size: 0.95rem; font-weight: 800; opacity: 0.9; margin-bottom: 4px;">目前的 <span id="acc-display-title">旅程總支出</span></p>
            <p style="font-size: 2.2rem; font-weight: 900; line-height: 1.1;"><span class="curr-sym">¥</span> <span id="acc-total-jpy">0</span></p>
            <p style="font-size: 0.95rem; font-weight: 800; opacity: 0.9; margin-top: 8px;">折合 NT$ <span id="acc-total-twd">0</span></p>
        </div>

        <div class="filter-scroll">
            <div class="filter-pill active acc" onclick="setAccFilter('全部', this)">全部</div>
            <div class="filter-pill acc" onclick="setAccFilter('飲食', this)">飲食</div>
            <div class="filter-pill acc" onclick="setAccFilter('交通', this)">交通</div>
            <div class="filter-pill acc" onclick="setAccFilter('購物', this)">購物</div>
            <div class="filter-pill acc" onclick="setAccFilter('門票', this)">門票</div>
            <div class="filter-pill acc" onclick="setAccFilter('住宿', this)">住宿</div>
            <div class="filter-pill acc" onclick="setAccFilter('其他', this)">其他</div>
        </div>

        <div style="display: flex; gap: 12px; margin-bottom: 24px;">
            <button onclick="toggleForm('main-calc-panel')" style="flex: 1; background: var(--card-bg); color: var(--main-text); border: 2px solid var(--color-acc); box-shadow: 2px 3px 0 rgba(180, 155, 170, 0.2);">
                🧮 計算機
            </button>
            <button onclick="toggleForm('edit-acc-form-container', openAccForm)" style="flex: 2; background: var(--color-acc); border-color: var(--color-acc); color: white; box-shadow: 2px 3px 0 rgba(180, 155, 170, 0.3);">
                ＋ 記錄花費
            </button>

        <div id="main-calc-panel" style="display: none;" class="calc-panel">
            <div class="calc-display" id="calc-res">0</div>
            <button type="button" class="calc-btn op" onclick="calcInput('C')">C</button>
            <button type="button" class="calc-btn op" onclick="calcInput('/')">÷</button>
            <button type="button" class="calc-btn op" onclick="calcInput('*')">×</button>
            <button type="button" class="calc-btn op" onclick="calcInput('DEL')">←</button>
            
            <button type="button" class="calc-btn" onclick="calcInput('7')">7</button>
            <button type="button" class="calc-btn" onclick="calcInput('8')">8</button>
            <button type="button" class="calc-btn" onclick="calcInput('9')">9</button>
            <button type="button" class="calc-btn op" onclick="calcInput('-')">-</button>
            
            <button type="button" class="calc-btn" onclick="calcInput('4')">4</button>
            <button type="button" class="calc-btn" onclick="calcInput('5')">5</button>
            <button type="button" class="calc-btn" onclick="calcInput('6')">6</button>
            <button type="button" class="calc-btn op" onclick="calcInput('+')">+</button>
            
            <button type="button" class="calc-btn" onclick="calcInput('1')">1</button>
            <button type="button" class="calc-btn" onclick="calcInput('2')">2</button>
            <button type="button" class="calc-btn" onclick="calcInput('3')">3</button>
            <button type="button" class="calc-btn" onclick="calcInput('.')">.</button>
            
            <button type="button" class="calc-btn eq" onclick="calcInput('=')" style="grid-column: span 2; background: var(--main-btn); border-color: var(--main-btn); color: white;">= 結算</button>
            <button type="button" class="calc-btn" onclick="calcInput('0')" style="grid-column: span 2;">0</button>
            
            <button type="button" class="calc-btn" onclick="useCalcAmount()" style="grid-column: span 4; background: var(--color-acc); color: white; border-color: var(--color-acc); margin-top: 8px; box-shadow: 2px 3px 0 rgba(180, 155, 170, 0.3);">
                帶入並新增支出
            </button>
        </div>

        <div id="edit-acc-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 20px; border: 2px solid var(--main-border); margin-bottom: 24px;">
            <h3 id="acc-form-title" style="margin-bottom: 16px; font-weight: 900;">新增支出</h3>
            <input type="hidden" id="edit-acc-id">
            
            <input type="text" id="edit-acc-name" placeholder="這筆錢花在哪？ (如: 一蘭拉麵)">
            <input type="number" id="edit-acc-jpy" placeholder="花費外幣金額">

            <div style="display: flex; gap: 10px; margin-bottom: 12px;">
                <input type="date" id="edit-acc-date" style="flex: 1.2;">
                <select id="edit-acc-cat" style="flex: 0.8;">
                    <option value="飲食">飲食</option><option value="交通">交通</option><option value="購物">購物</option><option value="門票">門票</option><option value="住宿">住宿</option><option value="其他">其他</option>
                </select>
            </div>
            
            <select id="edit-acc-pay" style="margin-bottom: 12px;">
                <option value="card">💳 刷卡 (自動網路即時匯率)</option>
                <option value="cash">💵 付現 (固定手動現金匯率)</option>
            </select>
            
            <input type="text" id="edit-acc-note" placeholder="備註用途 (選填)">
            
            <div style="display: flex; gap: 10px; margin-top: 12px;">
                <button type="button" onclick="document.getElementById('edit-acc-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button type="button" id="acc-save-btn" onclick="saveAccounting()" style="flex: 2; background: var(--color-acc); border-color: var(--color-acc); color: white;">儲存紀錄</button>
            </div>
        </div>
        <div id="accounting-list"></div>
    </div>

    <div id="settings" class="page">
        <div class="card">
            <h3 style="margin-bottom:20px; font-weight: 900;">⚙️ 匯率設定</h3>
            
            <label style="font-size: 0.95rem; font-weight: 800; display: block; margin: 0 0 8px 4px;">手動設定匯率</label>
            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                <input type="number" step="0.0001" id="manual-rate-input" placeholder="例如: 0.215" style="margin: 0; flex: 2;">
                <button onclick="saveManualRate()" style="flex: 1; background: var(--color-slate); border-color: var(--color-slate);">儲存</button>
            </div>

            <div style="text-align: center; margin: 16px 0; color: var(--text-muted); font-size: 0.85rem; font-weight: 700;">— 或 —</div>
            
            <button id="update-rate-btn" onclick="fetchLiveRate()" class="btn-outline" style="width: 100%; margin-bottom: 16px; background: var(--card-bg);">
                網路最新匯率
            </button>
            
            <div style="background: var(--input-bg); padding: 16px; border-radius: 14px; border: 2px solid var(--main-border); margin-bottom: 10px;">
                <div style="display: flex; justify-content: space-around; text-align: center;">
                    <div><p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 800;">網路匯率</p><p style="font-size: 1.3rem; font-weight: 900;" id="settings-rate-auto">0.21</p></div>
                    <div><p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 800;">手動匯率</p><p style="font-size: 1.3rem; font-weight: 900;" id="settings-rate-manual">0.21</p></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom:20px; font-weight: 900; color: var(--color-terracotta);">💾 資料備份</h3>
            <p style="font-size: 0.95rem; color: var(--text-muted); margin-bottom: 12px; margin-left: 4px; font-weight: 700;">複製下方亂碼，換手機時貼上就能還原所有資料。</p>
            <textarea id="backup-data" placeholder="備份碼顯示於此..." style="height: 80px; font-size: 0.85rem; line-height: 1.5; background: var(--input-bg); border-color: var(--main-border);"></textarea>
            <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                <button onclick="exportData()" style="flex:1;">導出</button>
                <button onclick="importData()" style="flex:1;" class="btn-outline">導入</button>
            </div>
            
            <button onclick="resetData()" style="width: 100%; background: #FFF0F0; color: var(--color-terracotta); border-color: rgba(205,139,118,0.5);" class="btn-outline">⚠️ 清空所有資料</button>
        </div>
    </div>

    <nav class="bottom-nav">

            <div class="nav-icon-bg" style="--bg-color: var(--color-yellow);">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>

        </div>
        <div id="nav-luggage" class="nav-item" onclick="nav('luggage')">
            <div class="nav-icon-bg" style="--bg-color: var(--color-terracotta);">
                <svg class="nav-svg" viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="15" rx="2"></rect><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>

                <svg class="nav-svg" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            </div>
            <span>購物</span>
        </div>
        <div id="nav-accounting" class="nav-item" onclick="nav('accounting')">
            <div class="nav-icon-bg" style="--bg-color: var(--color-acc);">
                <svg class="nav-svg" viewBox="0 0 24 24"><path d="M21 12V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-5z"></path><path d="M16 10h5v4h-5z"></path></svg>

        </div>
        <div id="nav-settings" class="nav-item" onclick="nav('settings')">
            <div class="nav-icon-bg" style="--bg-color: var(--color-slate);">
                <svg class="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
            <span>設定</span>
        </div>
    </nav>

<script>
    // 💯 預設多國匯率與漂亮範例資料
    const defaultData = { 
        currency: 'JPY',
        autoRates: { JPY: 0.2145, KRW: 0.0235, USD: 32.1, EUR: 34.5, THB: 0.91 },
        manualRates: { JPY: 0.215, KRW: 0.024, USD: 32.5, EUR: 35.0, THB: 0.95 },
        luggage: [
            { id: 1, name: "護照與簽證影本", note: "放在隨身小包", checked: false },
            { id: 2, name: "外幣現金 & 信用卡", note: "確認是否有海外回饋", checked: false }
        ], 
        itinerary: [
            { id: 1, date: "Day 1", realDate: "2026-04-05", time: "10:30", end: "國際機場", note: "先去買交通通票", checked: false },
            { id: 2, date: "Day 1", realDate: "2026-04-05", time: "12:30", end: "熱門排隊美食", note: "記得先抽號碼牌", checked: false },
            { id: 3, date: "Day 2", realDate: "2026-04-06", time: "09:00", end: "當地著名景點", note: "體驗當地文化", checked: false }
        ], 
        shopping: [
            { id: 1, name: "紀念品明信片", qty: "2", price_jpy: "680", forWho: "自己買", shop: "景點紀念品店", note: "挑選特色款", image: "", checked: false },
            { id: 2, name: "國際電壓吹風機", qty: "1", price_jpy: "15000", forWho: "家人", shop: "大型電器行", note: "最新型號", image: "", checked: false },
            { id: 3, name: "知名保健食品", qty: "3", price_jpy: "4500", forWho: "代購", shop: "連鎖藥妝店", note: "朋友托買", image: "", checked: false }
        ],
        accounting: [
            { id: 1, name: "機場快線車票", category: "交通", price_jpy: "2500", twd_price: 538, date: "2026-04-05", payMethod: "card", note: "直達市區" },
            { id: 2, name: "道地午餐", category: "飲食", price_jpy: "1200", twd_price: 258, date: "2026-04-05", payMethod: "cash", note: "" }
        ]
    };
    
    let appData = JSON.parse(localStorage.getItem('jpTravelApp'));
    
    if (!appData) {
        appData = defaultData;
    } else {
        if (appData.rate !== undefined || appData.autoRate !== undefined) { 
            appData.autoRates = { JPY: appData.autoRate || 0.2145, KRW: 0.0235, USD: 32.1, EUR: 34.5, THB: 0.91 };
            appData.manualRates = { JPY: appData.manualRate || 0.215, KRW: 0.024, USD: 32.5, EUR: 35.0, THB: 0.95 };
            appData.currency = 'JPY';
            delete appData.rate; delete appData.autoRate; delete appData.manualRate;
        }
        if (!appData.currency) appData.currency = 'JPY';
        if (!appData.luggage) appData.luggage = defaultData.luggage;
        if (!appData.itinerary) appData.itinerary = defaultData.itinerary;
        if (!appData.shopping) appData.shopping = defaultData.shopping;
        if (!appData.accounting) appData.accounting = defaultData.accounting;
        
        appData.accounting.forEach(a => { if(!a.payMethod) a.payMethod = 'cash'; });
    }

    let currentShopFilter = 'all';
    let currentShopForFilter = '全部';
    let currentAccFilter = '全部';
    let calcMode = 'auto';
    let currentCalcStr = "0";

    const currInfo = {
        JPY: { s: '¥', n: '日幣', flag: '🇯🇵' },
        KRW: { s: '₩', n: '韓元', flag: '🇰🇷' },
        USD: { s: '$', n: '美金', flag: '🇺🇸' },
        EUR: { s: '€', n: '歐元', flag: '🇪🇺' },
        THB: { s: '฿', n: '泰銖', flag: '🇹🇭' }
    };

    function saveData() { localStorage.setItem('jpTravelApp', JSON.stringify(appData)); updateStats(); }

    // 💯 導航與分頁記憶
    function nav(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => {
            n.classList.remove('active');
            n.querySelector('.nav-icon-bg').style.backgroundColor = 'transparent';
        });
        document.getElementById(pageId).classList.add('active');
        const activeNav = document.getElementById('nav-' + pageId);
        activeNav.classList.add('active');
        const activeBg = activeNav.querySelector('.nav-icon-bg');
        activeBg.style.backgroundColor = getComputedStyle(activeBg).getPropertyValue('--bg-color');
        
        localStorage.setItem('jpTravelApp_lastTab', pageId);
        
        if(pageId === 'itinerary') renderItinerary();
        if(pageId === 'luggage') renderLuggage();
        if(pageId === 'shopping') renderShopping();
        if(pageId === 'accounting') renderAccounting();
        window.scrollTo(0, 0);
    }

    function formatShortDate(dateStr) {
        if(!dateStr) return '';
        const d = new Date(dateStr);
        return isNaN(d.getTime()) ? dateStr : `${d.getMonth()+1}/${d.getDate()}`;
    }

    function toggleForm(id, setupFunc = null) {
        const el = document.getElementById(id);
        if (el.style.display === 'none' || el.style.display === '') {
            if (setupFunc) setupFunc();
            el.style.display = id === 'main-calc-panel' ? 'grid' : 'block'; 
            window.scrollTo({ top: el.offsetTop - 20, behavior: 'smooth' });
        } else { el.style.display = 'none'; }
    }

    // --- 🧮 獨立計算機功能 ---
    function toggleMainCalculator() { toggleForm('main-calc-panel'); }
    
    function calcInput(key) {
        const display = document.getElementById('calc-res');
        if(key === 'C') { currentCalcStr = "0"; }
        else if(key === 'DEL') { currentCalcStr = currentCalcStr.length > 1 ? currentCalcStr.slice(0, -1) : "0"; }
        else if(key === '=') { 
            try { 
                const res = eval(currentCalcStr); 
                currentCalcStr = Math.round(res).toString();
            } catch(e) { currentCalcStr = "Error"; }
        }
        else { currentCalcStr = currentCalcStr === "0" ? key : currentCalcStr + key; }
        display.innerText = currentCalcStr;
    }

    function useCalcAmount() {
        try {
            const res = eval(currentCalcStr);
            const rounded = Math.round(res);
            document.getElementById('edit-acc-form-container').style.display = 'block';
            openAccForm(); 
            document.getElementById('edit-acc-jpy').value = rounded; 
            document.getElementById('main-calc-panel').style.display = 'none'; 
            window.scrollTo({ top: document.getElementById('edit-acc-form-container').offsetTop - 20, behavior: 'smooth' });
        } catch(e) {
            alert("計算錯誤，請確認輸入內容！");
        }
    }

    // --- 💱 首頁雙向匯率 (修復按鈕顏色Bug) ---
    function changeCurrency() {
        appData.currency = document.getElementById('currency-selector').value;
        saveData();
    }

    function setCalcMode(mode) {
        calcMode = mode;
        const btnAuto = document.getElementById('calc-btn-auto');
        const btnManual = document.getElementById('calc-btn-manual');
        
        btnAuto.className = mode === 'auto' ? '' : 'btn-outline';
        btnAuto.style.background = mode === 'auto' ? 'var(--main-btn)' : 'var(--card-bg)';
        btnAuto.style.color = mode === 'auto' ? 'white' : 'var(--main-text)';
        
        btnManual.className = mode === 'manual' ? '' : 'btn-outline';
        btnManual.style.background = mode === 'manual' ? 'var(--main-btn)' : 'var(--card-bg)';
        btnManual.style.color = mode === 'manual' ? 'white' : 'var(--main-text)';
        
        runCalculator('jpy');
    }

    function runCalculator(src = 'jpy') {
        const c = appData.currency;
        const rate = (calcMode === 'auto') ? appData.autoRates[c] : appData.manualRates[c];
        if (src === 'jpy') {
            const foreign = Number(document.getElementById('calc-input-jpy').value) || 0;
            document.getElementById('calc-input-twd').value = foreign ? Math.round(foreign * rate) : '';
        } else {
            const twd = Number(document.getElementById('calc-input-twd').value) || 0;
            document.getElementById('calc-input-jpy').value = twd ? Math.round(twd / rate) : '';
        }
    }

    // --- 記帳功能 (💯 鎖死金額與支付方式) ---
    function setAccFilter(cat, el) {
        currentAccFilter = cat;
        document.querySelectorAll('#accounting .filter-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        renderAccounting();
    }

    function renderAccounting() {
        const container = document.getElementById('accounting-list'); container.innerHTML = '';
        const c = appData.currency;
        const sym = currInfo[c].s;
        
        const filtered = currentAccFilter === '全部' ? appData.accounting : appData.accounting.filter(a => a.category === currentAccFilter);
        document.getElementById('acc-display-title').innerText = currentAccFilter === '全部' ? '旅程總支出' : `[${currentAccFilter}] 支出合計`;

        filtered.sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id).forEach(item => {
            const price = Number(item.price_jpy) || 0;
            
            // 讀取已經鎖死固定的台幣金額
            let twdFixed = item.twd_price;
            if (twdFixed === undefined) { // 如果是舊資料就補算
                twdFixed = Math.round(price * (item.payMethod === 'card' ? appData.autoRates[c] : appData.manualRates[c]));
                item.twd_price = twdFixed;
            }
            
            const payTag = item.payMethod === 'card' ? '💳 刷卡' : '💵 付現';

            container.innerHTML += `
            <div class="card" style="padding: 16px 20px;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="flex:1;">
                        <div style="display:flex; align-items:center; margin-bottom:8px; gap:8px;">
                            <span class="cat-tag">${item.category}</span>
                            <span style="font-size:0.85rem; color:var(--text-muted); font-weight:800;">${item.date.slice(5)}</span>
                        </div>
                        <b style="font-size:1.15rem; color:var(--main-text); display:block; margin-bottom:6px;">${item.name || '未命名支出'}</b>
                        <div style="display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;">
                            <span style="font-size:1.3rem; font-weight:900; color:var(--main-text);">${sym} ${price.toLocaleString()}</span>
                            <div style="display:flex; gap:6px;">
                                <span class="rate-tag">${payTag}</span>
                                <span class="rate-tag" style="color:var(--color-acc); border-color:var(--color-acc);">NT$ ${twdFixed.toLocaleString()}</span>
                            </div>
                        </div>
                        ${item.note ? `<p style="font-size:0.9rem; color:var(--text-muted); font-weight:700; margin-top:8px;">📝 ${item.note}</p>` : ''}
                    </div>
                    <div style="display:flex; flex-direction:column; gap:8px; margin-left:12px;">
                        <button class="icon-btn" onclick="editAcc(${item.id})" style="width:36px; height:36px;">✎</button>
                        <button class="icon-btn danger" onclick="deleteAcc(${item.id})" style="width:36px; height:36px;">✕</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function openAccForm() {
        document.getElementById('acc-form-title').innerText = '新增支出';
        document.getElementById('edit-acc-id').value = '';
        document.getElementById('edit-acc-name').value = '';
        document.getElementById('edit-acc-jpy').value = '';
        document.getElementById('edit-acc-note').value = '';
        document.getElementById('edit-acc-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('edit-acc-pay').value = 'card';

    // 💯 刷卡自動抓匯率並永久鎖死金額
    async function saveAccounting() {
        const id = document.getElementById('edit-acc-id').value;
        const name = document.getElementById('edit-acc-name').value;
        const jpy = document.getElementById('edit-acc-jpy').value;
        const date = document.getElementById('edit-acc-date').value;
        const cat = document.getElementById('edit-acc-cat').value;
        const pay = document.getElementById('edit-acc-pay').value;
        const note = document.getElementById('edit-acc-note').value; 
        
        if(!jpy) return alert("請輸入金額喔！");

        const c = appData.currency;
        let rateToUse = appData.manualRates[c];

        if (pay === 'card') {
            const saveBtn = document.getElementById('acc-save-btn');
            const orgText = saveBtn.innerText;
            saveBtn.innerText = '連線結算中...';
            try { 
                const r = await fetch('https://api.exchangerate-api.com/v4/latest/TWD'); 
                const d = await r.json(); 
                if(d.rates && d.rates[c]) {
                    appData.autoRates[c] = Math.round((1 / d.rates[c]) * 10000)/10000;
                }
            } catch(e) {
                console.log("Offline, using cached auto rate.");
            }
            rateToUse = appData.autoRates[c];
            saveBtn.innerText = orgText;
        }

        const twd = Math.round(Number(jpy) * rateToUse);

        const entry = { id: id ? Number(id) : Date.now(), name, price_jpy: jpy, twd_price: twd, date, category: cat, payMethod: pay, note };
        if(id) { appData.accounting = appData.accounting.map(a => a.id == id ? entry : a); }
        else { appData.accounting.push(entry); }
        
        document.getElementById('edit-acc-form-container').style.display='none';
        saveData(); renderAccounting();
    }

    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1200; const MAX_HEIGHT = 1200;
                let width = img.width; let height = img.height;
                if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.92)); 
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function updateStats() {
        const c = appData.currency || 'JPY';
        const sym = currInfo[c].s;
        
        document.getElementById('currency-selector').value = c;
        document.getElementById('calc-label-src').innerText = `${currInfo[c].flag} ${currInfo[c].n} (${c})`;
        document.querySelectorAll('.curr-sym').forEach(el => el.innerText = sym);

        const dL = appData.luggage.filter(l => l.checked).length;
        document.getElementById('stat-luggage').innerText = appData.luggage.length ? Math.round(dL/appData.luggage.length*100)+'%' : '0%';
        const dI = appData.itinerary.filter(i => i.checked).length;
        document.getElementById('stat-iti-percent').innerText = appData.itinerary.length ? Math.round(dI/appData.itinerary.length*100)+'%' : '0%';
        document.getElementById('stat-shopping').innerText = appData.shopping.filter(s => s.checked).length;
        document.getElementById('stat-shopping-total').innerText = appData.shopping.length;
        
        let totalForeign = 0;
        let totalTwd = 0;
        
        appData.accounting.forEach(a => {
            const price = Number(a.price_jpy) || 0;
            totalForeign += price;
            
            let twdFixed = a.twd_price;
            if (twdFixed === undefined) {
                twdFixed = Math.round(price * (a.payMethod === 'card' ? appData.autoRates[c] : appData.manualRates[c]));
            }
            totalTwd += twdFixed;
        });

        const statAccJpy = document.getElementById('stat-acc-jpy');
        if (statAccJpy) statAccJpy.innerText = totalForeign.toLocaleString();
        const statAccTwd = document.getElementById('stat-acc-twd');
        if (statAccTwd) statAccTwd.innerText = totalTwd.toLocaleString();

        const autoRate = appData.autoRates[c] || 0.21;
        const manualRate = appData.manualRates[c] || 0.21;

        document.getElementById('btn-rate-auto').innerText = autoRate;
        document.getElementById('btn-rate-manual').innerText = manualRate;
        document.getElementById('settings-rate-auto').innerText = autoRate;
        document.getElementById('settings-rate-manual').innerText = manualRate;
        document.getElementById('manual-rate-input').value = manualRate;
        
        runCalculator('jpy');
    }

    function saveManualRate() {
        const c = appData.currency;
        const val = parseFloat(document.getElementById('manual-rate-input').value);
        if(val && val > 0) { 
            appData.manualRates[c] = val; 
            saveData(); 
            alert(`手動匯率 (${c}) 已成功更新為: ${val}`); 
        } 
        else { alert("請輸入有效的匯率數字喔！"); }
    }

   async function fetchLiveRate() { 
        const btn = document.getElementById('update-rate-btn');
        const info = document.getElementById('rate-sync-info'); // 抓取首頁的提示文字
        
        if(btn) btn.innerText = "更新中...";
        if(info) info.innerText = "網路更新中..."; // 剛打開時顯示正在更新
        
        try { 
            const r = await fetch('https://api.exchangerate-api.com/v4/latest/TWD'); 
            const d = await r.json(); 
            
            if(d.rates) {
                appData.autoRates.JPY = Math.round((1 / d.rates.JPY) * 10000)/10000;
                appData.autoRates.KRW = Math.round((1 / d.rates.KRW) * 10000)/10000;
                appData.autoRates.USD = Math.round((1 / d.rates.USD) * 10000)/10000;
                appData.autoRates.EUR = Math.round((1 / d.rates.EUR) * 10000)/10000;
                appData.autoRates.THB = Math.round((1 / d.rates.THB) * 10000)/10000;
                saveData(); 
                
                if(btn) { 
                    btn.innerText = "✓ 已更新"; 
                    setTimeout(() => { btn.innerText = "網路最新匯率"; }, 3000); 
                }
                if(info) {
                    info.innerText = "最後自動更新: " + new Date().toLocaleTimeString(); // 成功後顯示當下時間
                }
            }
        } catch(e){ 
            if(btn) { 
                btn.innerText = "沒有網路不能更新"; 
                setTimeout(() => { btn.innerText = "網路最新匯率"; }, 3000); 
            }
            if(info) {
                info.innerText = "連網失敗，請稍後再試"; // 失敗時首頁也會提示
            }
        } 
    }

    function exportData() { document.getElementById('backup-data').value = btoa(unescape(encodeURIComponent(JSON.stringify(appData)))); alert("備份碼已生成！\n請複製並傳送到手機，或自己保存。"); }
    function importData() { try { const code = document.getElementById('backup-data').value; if(code) { appData = JSON.parse(decodeURIComponent(escape(atob(code)))); saveData(); alert("資料導入成功！"); location.reload(); } } catch(e) { alert("代碼錯誤，請確認備份碼是否完整！"); } }
    function resetData() { if(confirm("⚠️ 警告：確定要清空所有資料嗎？此動作無法復原！")) { localStorage.clear(); location.reload(); } }

    document.addEventListener("DOMContentLoaded", () => {
        const lastTab = localStorage.getItem('jpTravelApp_lastTab') || 'home';
        nav(lastTab);
        setCalcMode('auto');
        fetchLiveRate();
    });
</script>
</body>
</html>
