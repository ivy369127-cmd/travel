<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="旅行小助手">
    <meta name="theme-color" content="#FCF8F2">
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23FCF8F2' rx='112'/%3E%3Cpath d='M128 160h256v256H128z' fill='%23FFFFFF' stroke='%23C8B6A6' stroke-width='24' rx='32'/%3E%3Cpath d='M208 160V112a48 48 0 0 1 96 0v48' fill='none' stroke='%23C8B6A6' stroke-width='24' stroke-linecap='round'/%3E%3Ccircle cx='256' cy='288' r='48' fill='%23B59D8B'/%3E%3C/svg%3E">
    <link rel="icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23FCF8F2' rx='112'/%3E%3Cpath d='M128 160h256v256H128z' fill='%23FFFFFF' stroke='%23C8B6A6' stroke-width='24' rx='32'/%3E%3Cpath d='M208 160V112a48 48 0 0 1 96 0v48' fill='none' stroke='%23C8B6A6' stroke-width='24' stroke-linecap='round'/%3E%3Ccircle cx='256' cy='288' r='48' fill='%23B59D8B'/%3E%3C/svg%3E">
    
    <title>旅行小助手</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        /* 🎨 高級莫蘭迪 x 奶茶手帳風 (絕對不動) */
        :root { 
            --bg-cream: #FCF8F2;      
            --main-text: #8A7363;     
            --main-border: #C8B6A6;   
            --main-btn: #B59D8B;      
            --card-bg: #FFFFFF;       
            --color-yellow: #E2B965;     
            --color-terracotta: #CD8B76; 
            --color-matcha: #9CB292;     
            --color-babyblue: #8FAEC1;   
            --color-acc: #B49BAA;        
            --color-slate: #8B9FA8;      
            --text-muted: #B4A7A0;    
            --input-bg: #F9F6F1;      
            --shadow-color: rgba(138, 115, 99, 0.08);
        }
        
        html { background-color: var(--bg-cream); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-cream); color: var(--main-text); padding-bottom: 120px; line-height: 1.5; -webkit-tap-highlight-color: transparent; min-height: 100vh; background-image: radial-gradient(rgba(138, 115, 99, 0.06) 1px, transparent 1px); background-size: 18px 18px; }
        .page { display: none; padding: 18px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        header { background: var(--card-bg); color: var(--main-text); padding: calc(16px + env(safe-area-inset-top)) 20px 15px; font-size: 1.35rem; font-weight: 900; letter-spacing: 2px; position: sticky; top: 0; z-index: 50; text-align: center; border-bottom: 2px solid var(--main-border); border-radius: 0 0 24px 24px; box-shadow: 0 4px 15px var(--shadow-color); }
        .sticky-panel { position: sticky; top: calc(65px + env(safe-area-inset-top)); z-index: 40; background: var(--bg-cream); padding: 10px 0 15px; margin: -10px -18px 15px -18px; padding-left: 18px; padding-right: 18px; border-bottom: 2px dashed rgba(200, 182, 166, 0.3); }
        .ghost { opacity: 0.4; background: #f0e9e4; border: 2px dashed var(--main-border); border-radius: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 18px; border: 2px solid var(--main-border); box-shadow: 2px 4px 0px rgba(200, 182, 166, 0.3); position: relative; }
        #luggage-list .card::before, #shopping-list .card::before, #accounting-list .card::before { content: ""; position: absolute; top: -7px; left: 25px; transform: rotate(-3deg); width: 40px; height: 14px; opacity: 0.4; border-radius: 2px; z-index: 10; }
        #luggage-list .card::before { background-color: var(--color-terracotta); }
        #shopping-list .card::before { background-color: var(--color-babyblue); }
        #accounting-list .card::before { background-color: var(--color-yellow); }

        .stat-wrapper { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 14px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.03); }
        .stat-label { font-weight: 800; font-size: 1.05rem; color: var(--main-text); }
        .stat-value { font-weight: 900; font-size: 1.15rem; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); border-top: 2px solid var(--main-border); z-index: 100; box-shadow: 0 -4px 15px var(--shadow-color); }
        .nav-item { text-align: center; font-size: 0.65rem; color: var(--text-muted); cursor: pointer; flex: 1; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-icon-bg { width: 40px; height: 40px; border-radius: 20px; display: flex; justify-content: center; align-items: center; transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: var(--text-muted); }
        .nav-svg { width: 22px; height: 22px; stroke: currentColor; fill: none !important; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item.active { color: var(--main-text); }
        .nav-item.active .nav-icon-bg { color: #fff; transform: translateY(-4px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        
        button { background: var(--main-btn); color: white; border: 2px solid var(--main-btn); padding: 14px 20px; border-radius: 14px; font-weight: 800; font-size: 1.05rem; cursor: pointer; transition: 0.15s; box-shadow: 2px 3px 0 rgba(200, 182, 166, 0.4); display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { transform: translate(2px, 2px); box-shadow: 0 1px 0 rgba(200, 182, 166, 0.4); }
        .btn-outline { background: var(--card-bg); color: var(--main-text); border: 2px solid var(--main-border); }
        .icon-btn { background: var(--input-bg); color: var(--main-text); border: 2px solid var(--main-border); border-radius: 10px; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; box-shadow: 1px 2px 0 rgba(200, 182, 166, 0.3); transition: 0.2s; flex-shrink: 0; }
        .icon-btn:active { transform: translate(1px,1px); box-shadow: none; }
        .icon-btn.danger { color: var(--color-terracotta); background: #FFF7F5; border-color: rgba(205, 139, 118, 0.5); }

        input, select, textarea { width: 100%; padding: 14px 16px; margin: 6px 0 16px 0; border: 2px solid var(--main-border); background: var(--card-bg); border-radius: 14px; font-size: 1.05rem; color: var(--main-text); outline: none; font-weight: 700; }
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--color-matcha); cursor: pointer; margin: 0 14px 0 0; border-radius: 6px; border: 2px solid var(--main-border); flex-shrink: 0; }
        .strikethrough { opacity: 0.6; filter: grayscale(50%); transition: all 0.3s; }
        .strikethrough span, .strikethrough b, .strikethrough p { text-decoration: line-through; }
        
        .timeline-container { display: flex; margin-bottom: 22px; align-items: stretch; }
        .timeline-left { display: flex; flex-direction: column; align-items: center; margin-right: 16px; width: 50px; }
        .timeline-time { background: var(--card-bg); border: 2px solid var(--main-border); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; color: var(--main-text); z-index: 2; margin-top: 10px; box-shadow: 1px 2px 0 rgba(200, 182, 166, 0.3); }
        .timeline-line { flex: 1; border-left: 3px dashed var(--main-border); margin-top: 5px; margin-bottom: -30px; z-index: 1; }
        .timeline-card { flex: 1; margin-bottom: 0; }

        .clean-divider { display:flex; align-items:center; margin: 25px 0 18px; }
        .clean-divider::before, .clean-divider::after { content:""; flex:1; height:2px; background:var(--main-border); opacity:0.3; border-radius:2px; }
        .clean-divider span { padding: 4px 16px; font-size: 0.9rem; font-weight: 800; color: var(--main-text); border: 2px solid var(--main-border); border-radius: 20px; background: var(--input-bg); margin: 0 12px; }
        
        .rate-tag { font-size: 0.72rem; padding: 2px 6px; border-radius: 6px; border: 1px solid var(--main-border); background: var(--input-bg); color: var(--main-text); font-weight: 700; white-space: nowrap; }
        .cat-tag { font-size: 0.8rem; padding: 2px 10px; border-radius: 12px; border: 2px solid var(--main-border); background: #FFF; color: var(--main-text); font-weight: 800; }
        .filter-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 20px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .filter-pill { padding: 8px 18px; border-radius: 20px; border: 2px solid var(--main-border); background: white; white-space: nowrap; font-size: 0.9rem; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        
        .filter-pill.active.acc { background: var(--color-acc); color: white; border-color: var(--color-acc); box-shadow: 2px 2px 0 rgba(180, 155, 170, 0.4); }
        .filter-pill.active.shop { background: var(--color-babyblue); color: white; border-color: var(--color-babyblue); box-shadow: 2px 2px 0 rgba(143, 174, 193, 0.4); }
        /* 🧊 行李清單換成紅土色 */
        .filter-pill.active.lug { background: var(--color-terracotta); color: white; border-color: var(--color-terracotta); box-shadow: 2px 2px 0 rgba(205, 139, 118, 0.4); }

        .calc-panel { background: var(--input-bg); border: 2px solid var(--main-border); border-radius: 16px; padding: 16px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { padding: 14px 0; background: white; border: 2px solid var(--main-border); border-radius: 12px; font-weight: 900; font-size: 1.2rem; color: var(--main-text); cursor: pointer; box-shadow: 1px 2px 0 rgba(200,182,166,0.3);}
        .calc-display { grid-column: span 4; background: white; border: 2px solid var(--main-border); border-radius: 12px; padding: 12px 16px; text-align: right; font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; overflow: hidden; color: var(--main-text);}
        .img-thumbnail { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; margin-top: 12px; display: block; border: 2px solid var(--main-border); box-shadow: 2px 2px 0 rgba(200, 182, 166, 0.3); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(138, 115, 99, 0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 85%; border-radius: 20px; border: 4px solid var(--bg-cream); }
    </style>
</head>
<body>

    <header id="header-title">旅行小助手</header>

    <div id="image-modal" class="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="">
    </div>

    <div id="shop-to-acc-modal" class="modal">
        <div class="card" style="width: 85%; max-width: 320px; padding: 24px; text-align: center; border-radius: 24px;">
            <h3 style="margin-bottom: 12px; font-weight: 900; color: var(--main-text);">🛒 加入記帳本？</h3>
            <p style="font-size: 0.95rem; font-weight: 700; color: var(--text-muted); margin-bottom: 20px;">是否將「<span id="shop-modal-name" style="color:var(--main-text); font-weight:900;"></span>」計入旅程總花費？</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button onclick="shopToAccDirect()" style="width: 100%; background: var(--color-acc); border-color: var(--color-acc);">✅ 直接計入帳本</button>
                <button onclick="shopToAccEdit()" style="width: 100%; background: var(--color-babyblue); border-color: var(--color-babyblue);">✎ 修改實際金額後記帳</button>
                <button onclick="shopToAccSkip()" style="width: 100%; background: var(--input-bg); color: var(--main-text); border-color: var(--main-border);">純打勾 (不記帳)</button>
                <button onclick="closeShopModal()" class="btn-outline" style="width: 100%; border: none;">取消</button>
            </div>
        </div>
    </div>

    <div id="home" class="page active">
        <div class="card">
            <h2 style="margin-bottom: 20px; font-weight: 900; font-size: 1.45rem;">今日進度</h2>
            <div class="stat-wrapper" style="background: rgba(205, 139, 118, 0.1);"><div class="stat-label" style="color: var(--color-terracotta);">行李準備</div><span class="stat-value" style="color: var(--color-terracotta);" id="stat-luggage">0%</span></div>
            <div class="stat-wrapper" style="background: rgba(156, 178, 146, 0.15);"><div class="stat-label" style="color: var(--color-matcha);">行程完成</div><span class="stat-value" style="color: var(--color-matcha);" id="stat-iti-percent">0%</span></div>
            <div class="stat-wrapper" style="background: rgba(143, 174, 193, 0.15);"><div class="stat-label" style="color: var(--color-babyblue);">購物清單</div><span class="stat-value" style="color: var(--color-babyblue);">已買 <span id="stat-shopping">0</span> / <span id="stat-shopping-total">0</span></span></div>
            <div class="stat-wrapper" style="background: rgba(180, 155, 170, 0.15);"><div class="stat-label" style="color: var(--color-acc);">目前總花費</div><span class="stat-value" style="color: var(--color-acc);"><span class="curr-sym">¥</span> <span id="stat-acc-jpy">0</span> <span style="font-size:0.85rem; color:var(--text-muted); margin-left:4px;">(約 NT$ <span id="stat-acc-twd">0</span>)</span></span></div>
        </div>
        <div class="card" style="padding-bottom: 24px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;"><h3 style="font-weight: 900;">匯率換算機</h3><select id="currency-selector" onchange="changeCurrency()" style="width: auto;"><option value="JPY">🇯🇵 日幣</option><option value="KRW">🇰🇷 韓元</option><option value="USD">🇺🇸 美金</option><option value="EUR">🇪🇺 歐元</option><option value="THB">🇹🇭 泰銖</option><option value="TWD">🇹🇼 台幣</option></select></div>
            <div style="display: flex; gap: 10px; margin-bottom: 18px;"><button id="calc-btn-auto" onclick="setCalcMode('auto')" style="flex: 1;">網路匯率 <span id="btn-rate-auto">0.21</span></button><button id="calc-btn-manual" onclick="setCalcMode('manual')" style="flex: 1;" class="btn-outline">手動匯率 <span id="btn-rate-manual">0.21</span></button></div>
            <div style="display: flex; align-items: center; gap: 12px; background: var(--price-bg); padding: 16px; border-radius: 16px; border: 2px solid var(--main-border);"><div style="flex: 1;"><input type="number" id="calc-input-jpy" placeholder="金額" oninput="runCalculator('jpy')"></div><div style="font-size: 1.5rem; color: var(--main-border); font-weight: 900;">⇌</div><div style="flex: 1;"><input type="number" id="calc-input-twd" placeholder="台幣" oninput="runCalculator('twd')"></div></div>
            <p style="font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-top: 12px;" id="rate-sync-info">同步中...</p>
        </div>
    </div>

    <div id="itinerary" class="page">
        <div class="sticky-panel"><button onclick="toggleForm('edit-iti-form-container', openItiForm)" style="width: 100%; background: var(--color-matcha); border-color: var(--color-matcha);">＋ 加入新行程</button></div>
        <div id="edit-iti-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px;"><h3 id="iti-form-title">行程編輯</h3><input type="hidden" id="edit-iti-id"><div style="display: flex; gap: 10px;"><select id="edit-iti-day" style="flex: 1;"><option value="Day 1">Day 1</option><option value="Day 2">Day 2</option><option value="Day 3">Day 3</option><option value="Day 4">Day 4</option><option value="Day 5">Day 5</option></select><input type="date" id="edit-iti-date" style="flex: 1.5;"></div><div style="display: flex; gap: 10px;"><input type="time" id="edit-iti-time" style="flex: 1;"><input type="text" id="edit-iti-end" placeholder="目的地" style="flex: 2;"></div><input type="text" id="edit-iti-note" placeholder="備註"><div style="display: flex; gap: 10px; margin-top: 12px;"><button onclick="document.getElementById('edit-iti-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button><button id="iti-save-btn" onclick="addItinerary()" style="flex: 2; background: var(--color-matcha); border-color: var(--color-matcha);">儲存</button></div></div>
        <div id="itinerary-list"></div>
    </div>

    <div id="luggage" class="page">
        <div class="sticky-panel">
            <div style="display:flex; gap:10px; margin-bottom: 10px;"><button onclick="addLuggageOwner()" class="btn-outline" style="flex: 1; font-size: 0.9rem;">＋ 新增行李清單</button><button onclick="toggleForm('edit-lug-form-container', openLugForm)" style="flex: 1; background: var(--color-terracotta); border-color: var(--color-terracotta); font-size: 0.9rem;">＋ 新增行李項目</button></div>
            <div id="lug-owner-filter-bar" class="filter-scroll"></div>
        </div>
        <div id="edit-lug-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px;"><h3 id="lug-form-title">行李編輯</h3><input type="hidden" id="edit-lug-id"><input type="text" id="edit-lug-name" placeholder="項目名稱"><input type="text" id="edit-lug-note" placeholder="備註"><div style="display: flex; gap: 10px; margin-top: 12px;"><button onclick="document.getElementById('edit-lug-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button><button id="lug-save-btn" onclick="addLuggage()" style="flex: 2; background: var(--color-terracotta); border-color: var(--color-terracotta);">儲存</button></div></div>
        <div id="luggage-list"></div>
    </div>

    <div id="shopping" class="page">
        <div class="sticky-panel"><button onclick="toggleForm('edit-form-container', openAddForm)" style="width: 100%; margin-bottom: 12px; background: var(--color-babyblue); border-color: var(--color-babyblue);">＋ 新增商品</button><div id="shop-filter-bar" class="filter-scroll"></div><div id="shop-location-filter-bar" class="filter-scroll"></div></div>
        <div id="edit-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px;"><h3 id="form-title">商品編輯</h3><input type="hidden" id="edit-id"><input type="text" id="edit-name" placeholder="名稱"><div style="display: flex; gap: 10px;"><input type="number" id="edit-qty" placeholder="數量" style="flex:0.8;" value="1"><input type="number" id="edit-price" placeholder="金額" style="flex:1.2;"></div><div style="display: flex; gap: 10px;"><select id="edit-shop-for" style="flex: 1;"></select><input type="text" id="edit-shop" placeholder="地點" style="flex: 2;"></div><input type="text" id="edit-note" placeholder="備註"><input type="file" id="edit-image" accept="image/*"><div style="display: flex; gap: 10px; margin-top: 16px;"><button onclick="document.getElementById('edit-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button><button onclick="saveShoppingItem()" style="flex: 2; background: var(--color-babyblue); border-color: var(--color-babyblue);">儲存</button></div></div>
        <div id="shopping-list"></div>
    </div>

    <div id="accounting" class="page">
        <div class="sticky-panel">
            <div class="card" style="background: var(--color-acc); color: #FFF; border: none; margin-bottom: 12px;"><div><p style="font-size: 0.95rem; opacity: 0.9;">旅程總支出</p><p style="font-size: 2.2rem; font-weight: 900;"><span class="curr-sym">¥</span> <span id="acc-total-jpy">0</span></p><p style="font-size: 0.9rem;">折合 NT$ <span id="acc-total-twd">0</span></p></div></div>
            <div class="filter-scroll" id="acc-for-filter-bar"></div><div class="filter-scroll" id="acc-cat-filter-bar"></div><div style="display: flex; gap: 12px;"><button onclick="toggleForm('main-calc-panel')" style="flex: 1; background: var(--card-bg); color: var(--main-text); border: 2px solid var(--color-acc);">🧮 計算機</button><button onclick="toggleForm('edit-acc-form-container', openAccForm)" style="flex: 2; background: var(--color-acc); border-color: var(--color-acc);">＋ 記錄花費</button></div>
        </div>
        <div id="main-calc-panel" style="display: none;" class="calc-panel"><div class="calc-display" id="calc-res">0</div><button type="button" class="calc-btn op" onclick="calcInput('C')">C</button><button type="button" class="calc-btn op" onclick="calcInput('/')">÷</button><button type="button" class="calc-btn op" onclick="calcInput('*')">×</button><button type="button" class="calc-btn op" onclick="calcInput('DEL')">←</button><button type="button" class="calc-btn" onclick="calcInput('7')">7</button><button type="button" class="calc-btn" onclick="calcInput('8')">8</button><button type="button" class="calc-btn" onclick="calcInput('9')">9</button><button type="button" class="calc-btn op" onclick="calcInput('-')">-</button><button type="button" class="calc-btn" onclick="calcInput('4')">4</button><button type="button" class="calc-btn" onclick="calcInput('5')">5</button><button type="button" class="calc-btn" onclick="calcInput('6')">6</button><button type="button" class="calc-btn op" onclick="calcInput('+')">+</button><button type="button" class="calc-btn" onclick="calcInput('1')">1</button><button type="button" class="calc-btn" onclick="calcInput('2')">2</button><button type="button" class="calc-btn" onclick="calcInput('3')">3</button><button type="button" class="calc-btn" onclick="calcInput('.')">.</button><button type="button" class="calc-btn eq" onclick="calcInput('=')" style="grid-column: span 2; background: var(--main-btn); border-color: var(--main-btn); color: white;">= 結算</button><button type="button" class="calc-btn" onclick="calcInput('0')" style="grid-column: span 2;">0</button><button type="button" class="calc-btn" onclick="useCalcAmount()" style="grid-column: span 4; background: var(--color-acc); border-color: var(--color-acc);">帶入並記錄</button></div>
        <div id="edit-acc-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 20px; border: 2px solid var(--main-border); margin-bottom: 24px;"><h3>花費編輯</h3><input type="hidden" id="edit-acc-id"><input type="hidden" id="edit-acc-shopId"><input type="text" id="edit-acc-name" placeholder="項目"><input type="number" id="edit-acc-jpy" placeholder="金額"><div style="display: flex; gap: 10px;"><input type="date" id="edit-acc-date" style="flex: 1;"><select id="edit-acc-forWho" style="flex: 0.8;"></select></div><div style="display: flex; gap: 10px;"><select id="edit-acc-cat" style="flex: 1;"></select><select id="edit-acc-pay" style="flex: 1.2;"><option value="card">💳 刷卡</option><option value="cash">💵 付現</option></select></div><input type="text" id="edit-acc-note" placeholder="備註"><div style="display: flex; gap: 10px; margin-top: 12px;"><button onclick="document.getElementById('edit-acc-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button><button id="acc-save-btn" onclick="saveAccounting()" style="flex: 2; background: var(--color-acc); border-color: var(--color-acc);">儲存</button></div></div>
        <div id="accounting-list"></div>
    </div>

    <div id="settings" class="page"><div class="card"><h3>分類與排序</h3><label>項目類別</label><div style="display: flex; gap: 10px;"><input type="text" id="new-cat-input" style="flex: 1;"><button onclick="addCategory('acc')">新增</button></div><div id="settings-cat-list"></div><label>算錢對象</label><div style="display: flex; gap: 10px;"><input type="text" id="new-shopfor-input" style="flex: 1;"><button onclick="addCategory('shopFor')">新增</button></div><div id="settings-shopfor-list"></div></div><div class="card"><h3>雲端管理</h3><button onclick="resetData()" style="width: 100%; color: var(--color-terracotta);">⚠️ 清空雲端所有資料</button></div></div>

    <nav class="bottom-nav">
        <div id="nav-home" class="nav-item active" onclick="nav('home')"><div class="nav-icon-bg" style="--bg-color: var(--color-yellow);"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div><span>首頁</span></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBh9s18n_te0ozRZuHBJeU62JhFAUp0-CY", authDomain: "mytravelapp-9a354.firebaseapp.com", databaseURL: "https://mytravelapp-9a354-default-rtdb.firebaseio.com", projectId: "mytravelapp-9a354", storageBucket: "mytravelapp-9a354.firebasestorage.app", messagingSenderId: "61234079329", appId: "1:61234079329:web:958213174020d9cfd7ec20" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const DB_PATH = '/japanTrip_ivy0407'; // 🔴 記得金門版要改成 /kinmenTrip_ivy0407

    const defaultData = { currency: 'JPY', categories: ['飲食', '交通', '購物', '門票', '住宿', '其他'], shopForCategories: ['自己買', '家人', '代購', '共同'], luggageOwners: ['我的行李'], autoRates: { JPY: 0.21, TWD: 1 }, manualRates: { JPY: 0.21, TWD: 1 }, luggage: [], itinerary: [], shopping: [], accounting: [] };
    let appData = defaultData; 
    let currentShopForFilter = '全部', currentShopLocationFilter = '全部', currentAccFilter = '全部', currentAccForFilter = '全部', currentLugOwner = '我的行李', calcMode = 'auto', currentCalcStr = "0";

    db.ref(DB_PATH).on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) { appData = data; if (!appData.luggageOwners) appData.luggageOwners = ['我的行李']; } else { db.ref(DB_PATH).set(defaultData); }
        if (!appData.luggageOwners.includes(currentLugOwner)) currentLugOwner = appData.luggageOwners[0];
        renderCategories(); updateStats();
        const activeNav = document.querySelector('.nav-item.active').id.replace('nav-', '');
        if(activeNav === 'itinerary') renderItinerary(); if(activeNav === 'luggage') renderLuggage(); if(activeNav === 'shopping') renderShopping(); if(activeNav === 'accounting') renderAccounting();
    });

    function saveData() { db.ref(DB_PATH).set(appData); updateStats(); }
    function initDrag(cid, arr) { Sortable.create(document.getElementById(cid), { delay: 300, delayOnTouchOnly: true, animation: 150, onEnd: () => { const ids = Array.from(document.getElementById(cid).children).map(c => c.dataset.id); const n = []; ids.forEach(id => { const i = appData[arr].find(x => x.id == id); if(i) n.push(i); }); appData[arr] = n; saveData(); } }); }
    function nav(p) { document.querySelectorAll('.page').forEach(el => el.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); document.getElementById(p).classList.add('active'); document.getElementById('nav-'+p).classList.add('active'); if(p === 'itinerary') renderItinerary(); if(p === 'luggage') renderLuggage(); if(p === 'shopping') renderShopping(); if(p === 'accounting') renderAccounting(); window.scrollTo(0,0); }
    function toggleForm(id, s) { const el = document.getElementById(id); if(el.style.display==='none'||el.style.display===''){ if(s)s(); el.style.display = id.includes('calc')?'grid':'block'; window.scrollTo({top:el.offsetTop-80, behavior:'smooth'}); }else el.style.display='none'; }
    function changeCurrency() { appData.currency = document.getElementById('currency-selector').value; saveData(); }
    function setCalcMode(m) { calcMode = m; runCalculator('jpy'); }
    function runCalculator(s) { const r = (calcMode === 'auto') ? appData.autoRates[appData.currency] : appData.manualRates[appData.currency]; if (s === 'jpy') { const f = Number(document.getElementById('calc-input-jpy').value); document.getElementById('calc-input-twd').value = f ? Math.round(f * r) : ''; } else { const t = Number(document.getElementById('calc-input-twd').value); document.getElementById('calc-input-jpy').value = t ? Math.round(t / r) : ''; } }

    // --- 🗓️ 行程 ---
    function renderItinerary() { const c = document.getElementById('itinerary-list'); c.innerHTML = ''; appData.itinerary.forEach(i => { c.innerHTML += `<div class="timeline-container ${i.checked?'strikethrough':''}" data-id="${i.id}"><div class="timeline-left"><div class="timeline-time">${i.time||'—'}</div><div class="timeline-line"></div></div><div class="card timeline-card"><div style="display:flex; justify-content:space-between;"><div><b>${i.end}</b><p><input type="checkbox" ${i.checked?'checked':''} onchange="toggleIti(${i.id})"> 打卡</p></div><div style="display:flex; gap:5px;"><button class="icon-btn" onclick="duplicateIti(${i.id})">⧉</button><button class="icon-btn" onclick="editIti(${i.id})">✎</button><button class="icon-btn danger" onclick="deleteIti(${i.id})">✕</button></div></div></div></div>`; }); initDrag('itinerary-list', 'itinerary'); }
    function toggleIti(id) { const i = appData.itinerary.find(x=>x.id==id); i.checked = !i.checked; saveData(); renderItinerary(); }
    function deleteIti(id) { if(confirm("刪除？")) { appData.itinerary = appData.itinerary.filter(i=>i.id!=id); saveData(); renderItinerary(); } }
    function openItiForm() { document.getElementById('iti-form-title').innerText='新增行程'; document.getElementById('edit-iti-id').value=''; document.getElementById('edit-iti-end').value=''; document.getElementById('iti-save-btn').onclick=addItinerary; }
    function addItinerary() { const e = document.getElementById('edit-iti-end').value; if(e){ appData.itinerary.push({id:Date.now(), date:document.getElementById('edit-iti-day').value, realDate:document.getElementById('edit-iti-date').value, time:document.getElementById('edit-iti-time').value, end:e, note:document.getElementById('edit-iti-note').value, checked:false}); document.getElementById('edit-iti-form-container').style.display='none'; saveData(); renderItinerary(); } }
    function editIti(id) { const i = appData.itinerary.find(x=>x.id==id); document.getElementById('iti-form-title').innerText='編輯行程'; document.getElementById('edit-iti-id').value=i.id; document.getElementById('edit-iti-end').value=i.end; document.getElementById('edit-iti-time').value=i.time; document.getElementById('iti-save-btn').onclick=saveEditIti; document.getElementById('edit-iti-form-container').style.display='block'; }
    function saveEditIti() { const id = document.getElementById('edit-iti-id').value; const i = appData.itinerary.find(x=>x.id==id); i.end = document.getElementById('edit-iti-end').value; i.time = document.getElementById('edit-iti-time').value; i.note = document.getElementById('edit-iti-note').value; document.getElementById('edit-iti-form-container').style.display='none'; saveData(); renderItinerary(); }
    function duplicateIti(id) { const i = appData.itinerary.find(x=>x.id==id); openItiForm(); document.getElementById('edit-iti-end').value=i.end; document.getElementById('edit-iti-note').value=i.note; document.getElementById('edit-iti-form-container').style.display='block'; window.scrollTo(0,0); }

    // --- 🧳 行李管理 ---
    function addLuggageOwner() { const n = prompt("清單名稱？"); if(n){ if(!appData.luggageOwners.includes(n)) appData.luggageOwners.push(n); currentLugOwner = n; saveData(); renderLuggage(); } }
    function deleteLugOwner(n) { if(confirm("確定刪除整份清單與內容？")) { appData.luggageOwners = appData.luggageOwners.filter(o=>o!==n); appData.luggage = appData.luggage.filter(l=>l.owner!==n); currentLugOwner = appData.luggageOwners[0]||''; saveData(); renderLuggage(); } }
    function renameLugOwner(n) { const nn = prompt("新名稱？", n); if(nn && nn!==n){ appData.luggageOwners = appData.luggageOwners.map(o=>o===n?nn:o); appData.luggage.forEach(l=>{if(l.owner===n)l.owner=nn;}); currentLugOwner=nn; saveData(); renderLuggage(); } }
    
    function renderLuggage() {
        const b = document.getElementById('lug-owner-filter-bar'); b.innerHTML = '';
        appData.luggageOwners.forEach(o => { b.innerHTML += `<div class="filter-pill ${currentLugOwner===o?'active':''} lug" onclick="setLugOwner('${o}')"><span>${o}</span><span onclick="event.stopPropagation();renameLugOwner('${o}')">✎</span><span onclick="event.stopPropagation();deleteLugOwner('${o}')">✕</span></div>`; });
        const c = document.getElementById('luggage-list'); c.innerHTML = '';
        appData.luggage.filter(l => l.owner === currentLugOwner).forEach(i => { c.innerHTML += `<div class="card" data-id="${i.id}"><div style="display:flex; justify-content:space-between;"><div><input type="checkbox" ${i.checked?'checked':''} onchange="toggleLug(${i.id})"> <b>${i.name}</b><p>${i.note||''}</p></div><div style="display:flex; gap:5px;"><button class="icon-btn" onclick="duplicateLug(${i.id})">⧉</button><button class="icon-btn" onclick="editLug(${i.id})">✎</button><button class="icon-btn danger" onclick="deleteLug(${i.id})">✕</button></div></div></div>`; });
        initDrag('luggage-list', 'luggage');
    }
    function setLugOwner(o) { currentLugOwner = o; renderLuggage(); }
    function toggleLug(id) { const i = appData.luggage.find(x=>x.id==id); i.checked = !i.checked; saveData(); renderLuggage(); }
    function deleteLug(id) { if(confirm("刪除？")) { appData.luggage = appData.luggage.filter(l=>l.id!=id); saveData(); renderLuggage(); } }
    function openLugForm() { document.getElementById('lug-form-title').innerText='新增行李'; document.getElementById('edit-lug-id').value=''; document.getElementById('edit-lug-name').value=''; document.getElementById('lug-save-btn').onclick=addLuggage; }
    function addLuggage() { const v = document.getElementById('edit-lug-name').value; if(v){ appData.luggage.push({id:Date.now(), name:v, note:document.getElementById('edit-lug-note').value, checked:false, owner:currentLugOwner}); document.getElementById('edit-lug-form-container').style.display='none'; saveData(); renderLuggage(); } }
    function editLug(id) { const i = appData.luggage.find(x=>x.id==id); document.getElementById('edit-lug-id').value=i.id; document.getElementById('edit-lug-name').value=i.name; document.getElementById('edit-lug-note').value=i.note; document.getElementById('lug-save-btn').onclick=saveEditLug; document.getElementById('edit-lug-form-container').style.display='block'; }
    function saveEditLug() { const id = document.getElementById('edit-lug-id').value; const i = appData.luggage.find(x=>x.id==id); i.name=document.getElementById('edit-lug-name').value; i.note=document.getElementById('edit-lug-note').value; document.getElementById('edit-lug-form-container').style.display='none'; saveData(); renderLuggage(); }
    function duplicateLug(id) { const i = appData.luggage.find(x=>x.id==id); openLugForm(); document.getElementById('edit-lug-name').value=i.name; document.getElementById('edit-lug-note').value=i.note; document.getElementById('edit-lug-form-container').style.display='block'; window.scrollTo(0,0); }

    // --- 🛒 購物 ---
    function renderShopping() { const c = document.getElementById('shopping-list'); c.innerHTML = ''; appData.shopping.forEach(i => { c.innerHTML += `<div class="card ${i.checked?'strikethrough':''}" data-id="${i.id}"><div style="display:flex; justify-content:space-between;"><div><input type="checkbox" ${i.checked?'checked':''} onchange="toggleShop(${i.id})"> <b>${i.name} x${i.qty}</b><p>¥${i.price_jpy}</p></div><div style="display:flex; gap:5px;"><button class="icon-btn" onclick="duplicateShop(${i.id})">⧉</button><button class="icon-btn" onclick="editShop(${i.id})">✎</button><button class="icon-btn danger" onclick="deleteShop(${i.id})">✕</button></div></div></div>`; }); initDrag('shopping-list', 'shopping'); }
    function toggleShop(id) { const i = appData.shopping.find(x=>x.id==id); if(i.checked){ i.checked=false; saveData(); renderShopping(); }else{ pendingShopId=id; document.getElementById('shop-modal-name').innerText=i.name; document.getElementById('shop-to-acc-modal').style.display='flex'; } }
    function openAddForm() { document.getElementById('edit-id').value=''; document.getElementById('edit-name').value=''; }
    function saveShoppingItem() { const id=document.getElementById('edit-id').value, n=document.getElementById('edit-name').value; if(n){ if(id){ const i=appData.shopping.find(x=>x.id==id); i.name=n; i.qty=document.getElementById('edit-qty').value; i.price_jpy=document.getElementById('edit-price').value; }else{ appData.shopping.unshift({id:Date.now(), name:n, qty:document.getElementById('edit-qty').value, price_jpy:document.getElementById('edit-price').value, checked:false}); } document.getElementById('edit-form-container').style.display='none'; saveData(); renderShopping(); } }
    function duplicateShop(id) { const i = appData.shopping.find(x=>x.id==id); openAddForm(); document.getElementById('edit-name').value=i.name; document.getElementById('edit-price').value=i.price_jpy; document.getElementById('edit-form-container').style.display='block'; window.scrollTo(0,0); }
    function deleteShop(id) { if(confirm("刪除？")) { appData.shopping = appData.shopping.filter(s=>s.id!=id); saveData(); renderShopping(); } }

    // --- 💰 記帳 ---
    function renderAccounting() { const c = document.getElementById('accounting-list'); c.innerHTML = ''; appData.accounting.forEach(i => { c.innerHTML += `<div class="card" data-id="${i.id}"><div style="display:flex; justify-content:space-between;"><div><b>${i.name}</b><p>¥${i.price_jpy} (NT$${i.twd_price})</p></div><div style="display:flex; gap:5px;"><button class="icon-btn" onclick="duplicateAcc(${i.id})">⧉</button><button class="icon-btn" onclick="editAcc(${i.id})">✎</button><button class="icon-btn danger" onclick="deleteAcc(${i.id})">✕</button></div></div></div>`; }); updateStats(); }
    function openAccForm() { document.getElementById('edit-acc-id').value=''; document.getElementById('edit-acc-name').value=''; }
    function saveAccounting() { const id=document.getElementById('edit-acc-id').value, n=document.getElementById('edit-acc-name').value, p=document.getElementById('edit-acc-jpy').value; if(p){ const twd = Math.round(p * appData.autoRates[appData.currency]); const e = {id:id?Number(id):Date.now(), name:n, price_jpy:p, twd_price:twd, date:document.getElementById('edit-acc-date').value, category:document.getElementById('edit-acc-cat').value}; if(id) appData.accounting=appData.accounting.map(a=>a.id==id?e:a); else appData.accounting.unshift(e); document.getElementById('edit-acc-form-container').style.display='none'; saveData(); renderAccounting(); } }
    function duplicateAcc(id) { const i = appData.accounting.find(x=>x.id==id); openAccForm(); document.getElementById('edit-acc-name').value=i.name; document.getElementById('edit-acc-jpy').value=i.price_jpy; document.getElementById('edit-acc-form-container').style.display='block'; window.scrollTo(0,0); }
    function deleteAcc(id) { if(confirm("刪除？")) { appData.accounting = appData.accounting.filter(a=>a.id!=id); saveData(); renderAccounting(); } }

    function updateStats() {
        const c = appData.currency; let tf=0, tt=0; appData.accounting.forEach(a=>{ tf+=Number(a.price_jpy); tt+=Number(a.twd_price); });
        document.getElementById('acc-total-jpy').innerText=tf.toLocaleString(); document.getElementById('acc-total-twd').innerText=tt.toLocaleString();
    }
    function resetData() { if(confirm("全部清空？")) { appData=defaultData; saveData(); location.reload(); } }
    function renderCategories() {
        const s1 = document.getElementById('edit-acc-cat'); s1.innerHTML = ''; appData.categories.forEach(c => s1.innerHTML += `<option value="${c}">${c}</option>`);
        const s2 = document.getElementById('edit-acc-forWho'); s2.innerHTML = ''; appData.shopForCategories.forEach(c => s2.innerHTML += `<option value="${c}">${c}</option>`);
        const s3 = document.getElementById('edit-shop-for'); s3.innerHTML = ''; appData.shopForCategories.forEach(c => s3.innerHTML += `<option value="${c}">${c}</option>`);
    }
</script>
